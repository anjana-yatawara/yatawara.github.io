// --- CONSTANTS ---
const GRAVITY=0.4,FLAP=-6.2,PIPE_GAP=138,PIPE_W=48,PIPE_SPACE=215,GROUND=48;
let pipeSpd=2.5;

// --- AUDIO ---
let ac=null;
function initAudio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();}
function snd(type){
  if(!ac)return;const t=ac.currentTime;
  switch(type){
    case'flap':{const o=ac.createOscillator(),g=ac.createGain();o.type='triangle';o.frequency.setValueAtTime(500,t);o.frequency.exponentialRampToValueAtTime(800,t+0.05);g.gain.setValueAtTime(0.07,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.07);o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.07);break;}
    case'score':{[700,900,1100].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.value=f;g.gain.setValueAtTime(0.05,t+i*0.04);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.04+0.08);o.connect(g);g.connect(ac.destination);o.start(t+i*0.04);o.stop(t+i*0.04+0.08);});break;}
    case'die':{const o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.frequency.setValueAtTime(500,t);o.frequency.exponentialRampToValueAtTime(30,t+0.6);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.6);o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.6);const buf=ac.createBuffer(1,ac.sampleRate*0.3,ac.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);const s=ac.createBufferSource();s.buffer=buf;const g2=ac.createGain();g2.gain.value=0.12;s.connect(g2);g2.connect(ac.destination);s.start(t+0.05);break;}
    case'evil':{for(let i=0;i<6;i++){const o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.frequency.setValueAtTime(200-i*15,t+i*0.12);o.frequency.exponentialRampToValueAtTime(120-i*10,t+i*0.12+0.1);g.gain.setValueAtTime(0.08,t+i*0.12);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.1);o.connect(g);g.connect(ac.destination);o.start(t+i*0.12);o.stop(t+i*0.12+0.12);}const o2=ac.createOscillator(),g2=ac.createGain();o2.type='sine';o2.frequency.value=50;g2.gain.setValueAtTime(0.1,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.8);o2.connect(g2);g2.connect(ac.destination);o2.start(t);o2.stop(t+0.8);break;}
    case'boss':{[60,75,90,120].forEach(f=>{const o=ac.createOscillator(),g=ac.createGain();const dist=ac.createWaveShaper();const curve=new Float32Array(256);for(let j=0;j<256;j++){const x=j*2/256-1;curve[j]=Math.tanh(x*3);}dist.curve=curve;o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.001,t+1.2);o.connect(dist);dist.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+1.2);});const o3=ac.createOscillator(),g3=ac.createGain();o3.type='square';o3.frequency.setValueAtTime(200,t);o3.frequency.setValueAtTime(400,t+0.3);o3.frequency.setValueAtTime(200,t+0.6);o3.frequency.setValueAtTime(400,t+0.9);g3.gain.setValueAtTime(0.04,t);g3.gain.exponentialRampToValueAtTime(0.001,t+1.2);o3.connect(g3);g3.connect(ac.destination);o3.start(t);o3.stop(t+1.2);break;}
    case'metal':{[82,123,165].forEach(f=>{const o=ac.createOscillator(),g=ac.createGain();const dist=ac.createWaveShaper();const curve=new Float32Array(256);for(let j=0;j<256;j++){const x=j*2/256-1;curve[j]=Math.tanh(x*5);}dist.curve=curve;o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(0.05,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.connect(dist);dist.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.4);});break;}
    case'powerup':{const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(400,t);[600,800,1000,1400].forEach((f,i)=>o.frequency.setValueAtTime(f,t+i*0.05+0.05));g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.3);break;}
  }
}

let bgmOn=false,bgmInt=null;
function startBGM(){
  if(!ac||bgmOn)return;bgmOn=true;
  const bpm=160,sixth=60000/bpm/4;
  const riff=[55,55,0,55,73.42,0,55,55,0,82.41,0,55,65.41,0,55,0];
  let step=0;
  bgmInt=setInterval(()=>{
    if(!ac)return;const t=ac.currentTime;const note=riff[step%riff.length];
    if(note>0){const o=ac.createOscillator(),g=ac.createGain();const dist=ac.createWaveShaper();const curve=new Float32Array(256);for(let j=0;j<256;j++){const x=j*2/256-1;curve[j]=Math.tanh(x*4);}dist.curve=curve;const filt=ac.createBiquadFilter();filt.type='lowpass';filt.frequency.value=800;o.type='sawtooth';o.frequency.value=note;g.gain.setValueAtTime(0.04,t);g.gain.exponentialRampToValueAtTime(0.01,t+sixth/1000*1.5);o.connect(dist);dist.connect(filt);filt.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+sixth/1000*1.8);}
    const buf=ac.createBuffer(1,ac.sampleRate*0.02,ac.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,4);const s=ac.createBufferSource();s.buffer=buf;const hg=ac.createGain();hg.gain.value=step%4===0?0.05:0.025;s.connect(hg);hg.connect(ac.destination);s.start(t);
    if(step%4===0){const ko=ac.createOscillator(),kg=ac.createGain();ko.type='sine';ko.frequency.setValueAtTime(120,t);ko.frequency.exponentialRampToValueAtTime(30,t+0.1);kg.gain.setValueAtTime(0.12,t);kg.gain.exponentialRampToValueAtTime(0.001,t+0.1);ko.connect(kg);kg.connect(ac.destination);ko.start(t);ko.stop(t+0.1);}
    step++;
  },sixth);
}
function stopBGM(){bgmOn=false;if(bgmInt){clearInterval(bgmInt);bgmInt=null;}}

function screenFlash(c,d){const el=document.getElementById('flash');el.style.background=c;el.style.opacity='0.3';el.style.transition='opacity 0.05s';setTimeout(()=>{el.style.transition=`opacity ${d||200}ms`;el.style.opacity='0';},30);}

function txt(text,x,y,sz,col,al){text=String(text).toUpperCase();const cw=5*sz+sz;let tw=text.length*cw-sz;let sx=al==='center'?x-tw/2:al==='right'?x-tw:x;X.fillStyle=col||'#fff';for(let c=0;c<text.length;c++){const rows=FD[text[c]];if(!rows){sx+=cw;continue;}for(let r=0;r<7;r++)for(let b=0;b<5;b++)if(rows[r]&(1<<(4-b)))X.fillRect(sx+b*sz,y+r*sz,sz,sz);sx+=cw;}}

// --- STATE ---
let state='title',fr=0,tp=0;
let dog={x:85,y:GH/2,vy:0};
let pipes=[],score=0,hi=0,particles=[];
let shakeT=0,shakeA=0;
let jumpscareTimer=0,jumpscareImg=null;
let bossMode=false,bossTimer=0,bossImg=null;
let powerupActive=false,powerupTimer=0;
let deathTimer=0,groundScroll=0,chaosLevel=0;

// Stars/embers
let stars=[];
function initStars(){stars=[];for(let i=0;i<50;i++)stars.push({x:Math.random()*GW,y:Math.random()*GH,s:0.15+Math.random()*0.6,sz:Math.random()>0.7?2:1,a:0.2+Math.random()*0.4});}

// Particles
function spark(x,y,n,col,spd,life){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*spd;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-0.5,life:life||20,ml:life||20,color:col,size:1+Math.random()*3});}}
function shake(a,d){shakeA=a;shakeT=d;}

// --- PIPES with real vertical movement ---
function spawnPipe(){
  const minY=80,maxY=GH-GROUND-PIPE_GAP-80;
  const gy=minY+Math.random()*(maxY-minY);
  // Each pipe gets its own movement pattern
  const moveSpeed=0.3+Math.random()*0.5+chaosLevel*0.8;
  const moveRange=15+chaosLevel*35; // at max chaos, pipes move 50px up/down
  const movePhase=Math.random()*Math.PI*2;
  pipes.push({x:GW+20,baseGy:gy,gy:gy,scored:false,moveSpeed,moveRange,movePhase,closing:0});
}

function drawPipe(p){
  const gap=PIPE_GAP-p.closing;
  const topH=p.gy;
  const botY=p.gy+gap;

  // Dark column body
  X.fillStyle=PAL.bg2;
  X.fillRect(p.x,0,PIPE_W,topH);
  X.fillRect(p.x,botY,PIPE_W,GH-GROUND-botY);

  // Lava veins inside
  X.globalAlpha=0.4;
  X.fillStyle=PAL.lava;
  for(let i=4;i<topH-4;i+=10){const ox=Math.sin(i*0.2+fr*0.06)*4;X.fillRect(p.x+PIPE_W/2+ox-2,i,3,7);}
  for(let i=botY+4;i<GH-GROUND-4;i+=10){const ox=Math.sin(i*0.2+fr*0.06)*4;X.fillRect(p.x+PIPE_W/2+ox-2,i,3,7);}
  X.globalAlpha=1;

  // Glowing edges (lava lips)
  X.save();X.shadowColor=PAL.lava;X.shadowBlur=6;
  X.fillStyle=PAL.flame;
  X.fillRect(p.x-2,topH-5,PIPE_W+4,5);
  X.fillRect(p.x-2,botY,PIPE_W+4,5);
  X.restore();

  // Inner glow at gap
  X.fillStyle=PAL.lava;X.globalAlpha=0.08;
  X.fillRect(p.x,topH-20,PIPE_W,20);
  X.fillRect(p.x,botY,PIPE_W,20);
  X.globalAlpha=1;

  // Fire drips
  if(fr%8===0&&state==='playing'){
    spark(p.x+Math.random()*PIPE_W,topH,1,PAL.flame,1,10);
    spark(p.x+Math.random()*PIPE_W,botY,1,PAL.lava,1,8);
  }
}

// --- INPUT ---
function doFlap(){
  if(state==='title'){initAudio();startBGM();state='ready';dog.y=GH/2;dog.vy=0;pipes=[];score=0;pipeSpd=2.5;chaosLevel=0;return;}
  if(state==='ready'){state='playing';dog.vy=FLAP;snd('flap');spawnPipe();return;}
  if(state==='playing'){dog.vy=FLAP;snd('flap');spark(dog.x-10,dog.y+5,3,PAL.flame,2,8);if(navigator.vibrate)navigator.vibrate(8);return;}
  if(state==='dead'){state='ready';dog.x=85;dog.y=GH/2;dog.vy=0;pipes=[];score=0;particles=[];pipeSpd=2.5;chaosLevel=0;bossMode=false;powerupActive=false;startBGM();return;}
}
window.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();doFlap();}});
C.addEventListener('mousedown',e=>{e.preventDefault();doFlap();});
C.addEventListener('touchstart',e=>{e.preventDefault();doFlap();},{passive:false});

// --- UPDATE ---
function update(){
  fr++;tp+=0.03;
  for(const s of stars){s.x-=s.s*(state==='playing'?1.5:0.3);if(s.x<-2){s.x=GW+2;s.y=Math.random()*GH;}}
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.02;p.life--;if(p.life<=0)particles.splice(i,1);}

  if(state==='title'){dog.y=GH/2-40+Math.sin(tp*1.5)*10;groundScroll+=0.5;
    if(fr%4===0)spark(Math.random()*GW,GH*0.85+Math.random()*15,1,Math.random()>0.5?PAL.lava:PAL.flame,1,12);return;}
  if(state==='ready'){dog.y=GH/2+Math.sin(tp*2)*6;groundScroll+=0.5;return;}

  if(state==='playing'){
    dog.vy+=GRAVITY;dog.y+=dog.vy;
    chaosLevel=Math.min(1,score/40);
    pipeSpd=2.5+score*0.03;
    groundScroll+=pipeSpd;

    // Update pipes - REAL vertical movement
    for(let i=pipes.length-1;i>=0;i--){
      const p=pipes[i];
      p.x-=pipeSpd;
      // Vertical oscillation - pipes move up and down!
      p.gy=p.baseGy+Math.sin(fr*0.02*p.moveSpeed+p.movePhase)*p.moveRange;
      // Clamp
      p.gy=Math.max(60,Math.min(GH-GROUND-PIPE_GAP-60,p.gy));
      // Closing at high chaos
      if(chaosLevel>0.5)p.closing=Math.sin(fr*0.06+i)*chaosLevel*12;else p.closing=0;

      if(!p.scored&&p.x+PIPE_W/2<dog.x){
        p.scored=true;score++;snd('score');
        if(score>hi)hi=score;
        if(score%10===0){screenFlash(PAL.gold,200);snd('metal');}
        if(score===15)triggerBoss('mid');
        if(score===30||score===50)triggerBoss('big');
        if(score>5&&Math.random()<0.15)triggerJumpscare();
        if(score%12===0)triggerPowerup();
      }
      if(p.x<-PIPE_W-20)pipes.splice(i,1);
    }
    if(pipes.length===0||pipes[pipes.length-1].x<GW-PIPE_SPACE)spawnPipe();

    // Collision
    const bx=dog.x,by=dog.y,br=13;
    if(by+br>GH-GROUND||by-br<0){die();return;}
    for(const p of pipes){
      const gap=PIPE_GAP-p.closing;
      if(bx+br>p.x&&bx-br<p.x+PIPE_W){
        if(by-br<p.gy||by+br>p.gy+gap){
          if(!powerupActive){die();return;}
          else{snd('metal');screenFlash(PAL.purpleGlow,100);powerupActive=false;}
        }
      }
    }

    if(jumpscareTimer>0)jumpscareTimer--;
    if(bossMode){bossTimer--;if(bossTimer<=0)bossMode=false;}
    if(powerupActive){powerupTimer--;if(powerupTimer<=0)powerupActive=false;}

    // Rocket trail fire from Basco (left side and around)
    if(fr%2===0){
      // Main trail (left/behind)
      for(let i=0;i<3;i++){
        particles.push({x:dog.x-15-Math.random()*10,y:dog.y+Math.random()*8-4,vx:-1.5-Math.random()*2,vy:(Math.random()-0.5)*1.5,life:12+Math.random()*8,ml:20,color:[PAL.lava,PAL.flame,PAL.glow][i%3],size:2+Math.random()*3});
      }
      // Surround fire (ring effect, more on left)
      const angle=Math.random()*Math.PI*2;
      const dist=12+Math.random()*4;
      const bias=-2; // shift left
      particles.push({x:dog.x+Math.cos(angle)*dist+bias,y:dog.y+Math.sin(angle)*dist,vx:Math.cos(angle)*0.5+bias*0.2,vy:Math.sin(angle)*0.5,life:6+Math.random()*4,ml:10,color:Math.random()>0.5?PAL.flame:PAL.glow,size:1+Math.random()*2});
    }
    // Extra big trail when boosting
    if(dog.vy<-2&&fr%2===0){
      for(let i=0;i<2;i++){
        particles.push({x:dog.x-18-Math.random()*8,y:dog.y+Math.random()*6-3,vx:-3-Math.random()*2,vy:(Math.random()-0.5)*2,life:15,ml:15,color:'#FFFFFF',size:1+Math.random()*2});
      }
    }

    if(fr%10===0)spark(Math.random()*GW,GH-GROUND+5,1,PAL.lava,0.5,8);
  }

  if(state==='dying'){dog.vy+=GRAVITY*0.8;dog.y+=dog.vy;deathTimer++;if(dog.y>GH-GROUND-15||deathTimer>60){dog.y=Math.min(dog.y,GH-GROUND-15);state='dead';stopBGM();}}
}

function die(){state='dying';deathTimer=0;dog.vy=-4;snd('die');shake(10,15);screenFlash(PAL.rage,300);if(navigator.vibrate)navigator.vibrate(60);spark(dog.x,dog.y,25,PAL.lava,5,25);spark(dog.x,dog.y,15,PAL.glow,4,20);}
function triggerJumpscare(){jumpscareTimer=22;jumpscareImg=Math.random()>0.5?'bascoBig':'midBoss';snd('evil');screenFlash(PAL.blood,150);shake(5,8);}
function triggerBoss(type){bossMode=true;bossTimer=120;bossImg=type==='big'?'bigBoss':'midBoss';snd('boss');screenFlash(PAL.lava,400);shake(8,20);}
function triggerPowerup(){powerupActive=true;powerupTimer=180;snd('powerup');screenFlash(PAL.purpleGlow,200);}

// --- DRAW ---
function draw(){
  // Pure black background
  X.fillStyle=PAL.bg1;X.fillRect(0,0,GW,GH);

  // Subtle dark red gradient at bottom
  const grad=X.createLinearGradient(0,GH*0.5,0,GH);
  grad.addColorStop(0,'transparent');
  grad.addColorStop(1,'rgba(139,0,0,0.15)');
  X.fillStyle=grad;X.fillRect(0,0,GW,GH);

  // Embers
  for(const s of stars){X.globalAlpha=s.a;X.fillStyle=fr%60<30?PAL.flame:PAL.warmGold;X.fillRect(Math.floor(s.x),Math.floor(s.y),s.sz,s.sz);}
  X.globalAlpha=1;

  if(shakeT>0){shakeT--;X.save();X.translate((Math.random()-0.5)*shakeA,(Math.random()-0.5)*shakeA);}

  // Pipes
  for(const p of pipes)drawPipe(p);

  // Ground (lava pool)
  const gy=GH-GROUND;
  X.fillStyle=PAL.bg2;X.fillRect(0,gy,GW,GROUND);
  // Lava surface shimmer
  for(let i=0;i<GW;i+=3){const h=1+Math.sin(i*0.08+fr*0.12)*2+Math.random();X.fillStyle=i%6<3?PAL.lava:PAL.flame;X.fillRect(i,gy-h,3,h+1);}
  // Glow line
  X.save();X.shadowColor=PAL.lava;X.shadowBlur=10;X.fillStyle=PAL.flame;X.fillRect(0,gy-1,GW,2);X.restore();

  // Particles (behind basco)
  for(const p of particles){X.globalAlpha=p.life/p.ml;X.fillStyle=p.color;X.fillRect(Math.floor(p.x),Math.floor(p.y),Math.ceil(p.size),Math.ceil(p.size));}
  X.globalAlpha=1;

  // Basco
  if(state!=='dead'||deathTimer<30){
    const tilt=Math.max(-30,Math.min(30,dog.vy*4));
    X.save();X.translate(dog.x,dog.y);X.rotate(tilt*Math.PI/180);
    const img=powerupActive?IMG.powerup:IMG.basco;
    const sz=powerupActive?28:18;
    if(img&&img.complete)X.drawImage(img,-sz,-sz,sz*2,sz*2);
    X.restore();
  }

  // Boss overlay
  if(bossMode&&bossImg&&IMG[bossImg]&&IMG[bossImg].complete){
    X.globalAlpha=0.12+Math.sin(fr*0.08)*0.04;
    const bsz=bossImg==='bigBoss'?180:120;
    X.drawImage(IMG[bossImg],GW/2-bsz/2,GH/3-bsz/2,bsz,bsz);
    X.globalAlpha=1;
  }

  // Jumpscare
  if(jumpscareTimer>0&&jumpscareImg&&IMG[jumpscareImg]&&IMG[jumpscareImg].complete){
    X.globalAlpha=jumpscareTimer>12?0.85:jumpscareTimer/15;
    X.drawImage(IMG[jumpscareImg],GW/2-110,GH/2-110,220,220);
    X.globalAlpha=1;
  }

  // Powerup bar
  if(powerupActive){
    X.save();X.shadowColor=PAL.purpleGlow;X.shadowBlur=8;
    txt('INVINCIBLE',GW/2,80,1,PAL.purpleGlow,'center');X.restore();
    X.fillStyle=PAL.bg3;X.fillRect(GW/2-40,92,80,4);
    X.fillStyle=PAL.purpleGlow;X.fillRect(GW/2-40,92,80*(powerupTimer/180),4);
  }

  // --- UI PER STATE ---
  if(state==='title'){
    // Cover art - centered, upper area
    if(IMG.cover&&IMG.cover.complete){X.globalAlpha=0.5;X.drawImage(IMG.cover,GW/2-130,30,260,260);X.globalAlpha=1;}

    // Title at BOTTOM
    X.save();X.shadowColor=PAL.lava;X.shadowBlur=20;
    const glow=Math.sin(tp)*0.2+0.8;X.globalAlpha=glow;
    txt('REVENGE OF',GW/2,GH-GROUND-155,2.5,PAL.lava,'center');
    txt('THE BASCO',GW/2,GH-GROUND-125,3.5,PAL.flame,'center');
    X.restore();X.globalAlpha=1;
    txt('TABASCO CHOOSES VIOLENCE',GW/2,GH-GROUND-92,1,PAL.warmGold,'center');

    const blink=Math.sin(tp*2.5)>0;
    if(blink){X.save();X.shadowColor=PAL.glow;X.shadowBlur=8;
      const mob='ontouchstart' in window;
      txt(mob?'TAP TO BEGIN':'PRESS SPACE',GW/2,GH-GROUND-55,1.5,PAL.white,'center');
    X.restore();}
    if(hi>0)txt('BEST '+hi,GW/2,GH-GROUND-30,1,PAL.gray,'center');
    txt('BY ANJANA YATAWARA',GW/2,GH-12,1,PAL.bg3,'center');
  }

  if(state==='ready'){
    gtxt('GET READY',GW/2,GH/3-20,2.5,PAL.glow,'center',12);
    const mob='ontouchstart' in window;
    txt(mob?'TAP TO FLY':'SPACE TO FLY',GW/2,GH/3+15,1,PAL.gray,'center');
  }

  if(state==='playing'||state==='dying'){
    X.save();X.shadowColor=PAL.lava;X.shadowBlur=6;
    txt(String(score),GW/2,22,3,PAL.white,'center');X.restore();
  }

  if(state==='dead'){
    // Dark overlay with red tint
    X.fillStyle='rgba(15,0,0,0.75)';X.fillRect(0,0,GW,GH);
    // Rage red tint
    X.fillStyle='rgba(139,0,0,0.08)';X.fillRect(0,0,GW,GH);

    if(IMG.cover&&IMG.cover.complete){X.globalAlpha=0.1;X.drawImage(IMG.cover,GW/2-80,15,160,160);X.globalAlpha=1;}

    gtxt('WASTED',GW/2,55,4,PAL.rage,'center',20);

    // Score panel
    X.fillStyle=PAL.bg2;X.fillRect(GW/2-95,95,190,110);
    X.strokeStyle=PAL.blood;X.lineWidth=1;X.strokeRect(GW/2-95,95,190,110);

    txt('SCORE',GW/2,108,1,PAL.gray,'center');
    gtxt(String(score),GW/2,124,3,PAL.white,'center',4);
    txt('BEST',GW/2,160,1,PAL.gray,'center');
    txt(String(hi),GW/2,174,2,PAL.gold,'center');

    if(score>=hi&&score>0)gtxt('NEW RECORD!',GW/2,215,1,PAL.gold,'center',6);

    const taunts=['BASCO WINS AGAIN','SKILL ISSUE','GIT GUD','WOOF WOOF','TABASCO SENDS REGARDS','VIOLENCE WAS CHOSEN','RIP BOZO','COPE AND SEETHE'];
    X.globalAlpha=0.4;txt(taunts[score%taunts.length],GW/2,238,1,PAL.warmGold,'center');X.globalAlpha=1;

    const blink=Math.sin(tp*2.5)>0;
    if(blink){X.save();X.shadowColor=PAL.flame;X.shadowBlur=8;
      const mob='ontouchstart' in window;
      txt(mob?'TAP TO RETRY':'SPACE TO RETRY',GW/2,275,1.5,PAL.white,'center');
    X.restore();}
  }

  if(shakeT>=0)X.restore();
}

function loop(){update();draw();requestAnimationFrame(loop);}
initStars();
try{const h=localStorage.getItem('rotb_hi');if(h)hi=parseInt(h)||0;}catch(e){}
setInterval(()=>{try{localStorage.setItem('rotb_hi',String(hi));}catch(e){}},2000);
loop();
</script>
