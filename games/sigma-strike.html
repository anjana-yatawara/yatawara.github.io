<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SIGMA STRIKE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;user-select:none;-webkit-user-select:none;font-family:monospace;}
canvas{display:block;margin:0 auto;image-rendering:pixelated;image-rendering:crisp-edges;}

/* CRT Overlay */
#crt-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;mix-blend-mode:multiply;}
#crt-overlay.on::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.15) 0px,rgba(0,0,0,0.15) 1px,transparent 1px,transparent 3px);animation:scanMove 8s linear infinite;}
#crt-overlay.on::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.5) 100%);}
@keyframes scanMove{0%{transform:translateY(0)}100%{transform:translateY(3px)}}

/* Virtual Joystick */
#joystick-zone{display:none;position:fixed;bottom:10px;left:10px;width:160px;height:160px;z-index:10;}
#joystick-base{position:absolute;bottom:0;left:0;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.12);}
#joystick-knob{position:absolute;bottom:35px;left:35px;width:50px;height:50px;border-radius:50%;background:rgba(0,229,255,0.2);border:2px solid rgba(0,229,255,0.4);transition:none;}
#bomb-btn{display:none;position:fixed;bottom:30px;right:30px;width:72px;height:72px;border-radius:50%;background:rgba(255,60,60,0.12);border:2px solid rgba(255,60,60,0.3);color:#ff6666;font-size:26px;z-index:10;-webkit-tap-highlight-color:transparent;cursor:pointer;}
#bomb-btn:active{background:rgba(255,60,60,0.35);transform:scale(0.92);}
@media(pointer:coarse){#joystick-zone,#bomb-btn{display:block;}}

/* Settings Toggle */
#settings-btn{position:fixed;top:10px;right:10px;width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#888;font-size:18px;z-index:20;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
#settings-btn:hover{background:rgba(255,255,255,0.15);}
#settings-panel{display:none;position:fixed;top:50px;right:10px;width:200px;background:rgba(10,10,20,0.95);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:14px;z-index:20;color:#ccc;font-size:12px;}
#settings-panel.open{display:block;}
#settings-panel label{display:block;margin-bottom:10px;}
#settings-panel input[type=range]{width:100%;margin-top:4px;accent-color:#00e5ff;}
#settings-panel .toggle-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.toggle-switch{position:relative;width:36px;height:20px;background:#333;border-radius:10px;cursor:pointer;transition:background 0.2s;}
.toggle-switch.on{background:#00e5ff;}
.toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform 0.2s;}
.toggle-switch.on::after{transform:translateX(16px);}

/* Combo Popup */
.combo-float{position:fixed;pointer-events:none;z-index:8;font-family:monospace;font-weight:bold;text-align:center;animation:floatUp 1s ease-out forwards;text-shadow:0 0 12px currentColor;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-30px) scale(1.1)}100%{opacity:0;transform:translateY(-60px) scale(0.8)}}

/* Screen Flash */
#flash-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:6;opacity:0;transition:opacity 0.05s;}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="crt-overlay" class="on"></div>
<div id="flash-overlay"></div>

<div id="joystick-zone">
  <div id="joystick-base"><div id="joystick-knob"></div></div>
</div>
<button id="bomb-btn">💥</button>

<button id="settings-btn">⚙</button>
<div id="settings-panel">
  <label>Music <input type="range" id="vol-music" min="0" max="100" value="40"></label>
  <label>SFX <input type="range" id="vol-sfx" min="0" max="100" value="70"></label>
  <div class="toggle-row"><span>CRT Effect</span><div class="toggle-switch on" id="toggle-crt"></div></div>
  <div class="toggle-row"><span>Screen Shake</span><div class="toggle-switch on" id="toggle-shake"></div></div>
</div>

<script>
// ============================================================
//  SIGMA STRIKE — Final Production Build
//  A Statistics-Themed Space Shooter
//  by Anjana Yatawara | yatawara.com
// ============================================================

const C = document.getElementById('gc');
const X = C.getContext('2d');

// --- SETTINGS ---
let settings = {
  musicVol: 0.4,
  sfxVol: 0.7,
  crt: true,
  shake: true
};

// Settings UI
const settingsBtn = document.getElementById('settings-btn');
const settingsPanel = document.getElementById('settings-panel');
settingsBtn.onclick = () => settingsPanel.classList.toggle('open');
document.getElementById('vol-music').oninput = e => { settings.musicVol = e.target.value / 100; updateMusicVolume(); };
document.getElementById('vol-sfx').oninput = e => { settings.sfxVol = e.target.value / 100; };
document.getElementById('toggle-crt').onclick = function() { this.classList.toggle('on'); settings.crt = this.classList.contains('on'); document.getElementById('crt-overlay').classList.toggle('on', settings.crt); };
document.getElementById('toggle-shake').onclick = function() { this.classList.toggle('on'); settings.shake = this.classList.contains('on'); };

// --- CONSTANTS ---
const GW = 480, GH = 720;
let scale = 1, offX = 0, offY = 0;
const STAR_LAYERS = [
  { count: 50, speed: 0.3, size: 1, alpha: 0.3 },
  { count: 35, speed: 0.7, size: 1.5, alpha: 0.5 },
  { count: 20, speed: 1.5, size: 2, alpha: 0.85 },
  { count: 8, speed: 2.2, size: 2.5, alpha: 1 }
];

// --- AUDIO ENGINE ---
let audioCtx = null;
let musicGain = null;
let sfxGain = null;
let musicPlaying = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicGain = audioCtx.createGain();
  musicGain.gain.value = settings.musicVol * 0.3;
  musicGain.connect(audioCtx.destination);
  sfxGain = audioCtx.createGain();
  sfxGain.gain.value = settings.sfxVol;
  sfxGain.connect(audioCtx.destination);
}

function updateMusicVolume() {
  if (musicGain) musicGain.gain.value = settings.musicVol * 0.3;
}

// --- PROCEDURAL SYNTHWAVE BGM ---
let bgmOscs = [];
let bgmInterval = null;

function startBGM() {
  if (!audioCtx || musicPlaying) return;
  musicPlaying = true;

  // Bass line - deep and driving
  const bassNotes = [55, 55, 65.41, 73.42, 55, 55, 82.41, 73.42]; // A1, A1, C2, D2...
  let bassIdx = 0;
  const bassOsc = audioCtx.createOscillator();
  const bassFilter = audioCtx.createBiquadFilter();
  bassFilter.type = 'lowpass';
  bassFilter.frequency.value = 200;
  bassOsc.type = 'sawtooth';
  bassOsc.frequency.value = bassNotes[0];
  bassOsc.connect(bassFilter);
  bassFilter.connect(musicGain);
  bassOsc.start();
  bgmOscs.push(bassOsc);

  // Pad - warm chord
  const padFreqs = [220, 277.18, 329.63]; // Am chord
  const padOscs = padFreqs.map(f => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    g.gain.value = 0.04;
    o.type = 'sine';
    o.frequency.value = f;
    o.connect(g);
    g.connect(musicGain);
    o.start();
    bgmOscs.push(o);
    return { osc: o, gain: g };
  });

  // Arpeggio - the hook
  const arpNotes = [440, 523.25, 659.25, 523.25, 440, 329.63, 392, 440];
  let arpIdx = 0;
  const arpOsc = audioCtx.createOscillator();
  const arpGain = audioCtx.createGain();
  const arpFilter = audioCtx.createBiquadFilter();
  arpFilter.type = 'lowpass';
  arpFilter.frequency.value = 2000;
  arpOsc.type = 'square';
  arpGain.gain.value = 0.03;
  arpOsc.connect(arpFilter);
  arpFilter.connect(arpGain);
  arpGain.connect(musicGain);
  arpOsc.start();
  bgmOscs.push(arpOsc);

  // Hi-hat rhythm
  const hihatBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.03, audioCtx.sampleRate);
  const hd = hihatBuf.getChannelData(0);
  for (let i = 0; i < hd.length; i++) hd[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / hd.length, 4);

  let beatCount = 0;
  const bpm = 128;
  const sixteenth = 60000 / bpm / 4;

  bgmInterval = setInterval(() => {
    if (!audioCtx || state === 'paused') return;

    // Bass - every 2 beats
    if (beatCount % 8 === 0) {
      bassOsc.frequency.setValueAtTime(bassNotes[bassIdx % bassNotes.length], audioCtx.currentTime);
      bassIdx++;
    }

    // Arp - every sixteenth
    if (beatCount % 2 === 0) {
      arpOsc.frequency.setValueAtTime(arpNotes[arpIdx % arpNotes.length], audioCtx.currentTime);
      const now = audioCtx.currentTime;
      arpGain.gain.setValueAtTime(0.035, now);
      arpGain.gain.exponentialRampToValueAtTime(0.015, now + sixteenth * 2 / 1000);
      arpIdx++;
    }

    // Hi-hat
    if (beatCount % 2 === 0) {
      const src = audioCtx.createBufferSource();
      src.buffer = hihatBuf;
      const g = audioCtx.createGain();
      const accent = beatCount % 4 === 0 ? 0.06 : 0.03;
      g.gain.value = accent;
      src.connect(g);
      g.connect(musicGain);
      src.start();
    }

    beatCount++;
  }, sixteenth);
}

function stopBGM() {
  musicPlaying = false;
  bgmOscs.forEach(o => { try { o.stop(); } catch(e) {} });
  bgmOscs = [];
  if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
}

// --- ENHANCED SFX ---
function playSound(type) {
  if (!audioCtx || !sfxGain) return;
  const now = audioCtx.currentTime;
  const vol = settings.sfxVol;

  switch(type) {
    case 'shoot': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(1200, now);
      o.frequency.exponentialRampToValueAtTime(300, now + 0.06);
      g.gain.setValueAtTime(0.06 * vol, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      o.connect(g); g.connect(sfxGain);
      o.start(now); o.stop(now + 0.06);
      // Layered click
      const o2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      o2.type = 'triangle';
      o2.frequency.setValueAtTime(2400, now);
      o2.frequency.exponentialRampToValueAtTime(800, now + 0.03);
      g2.gain.setValueAtTime(0.03 * vol, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
      o2.connect(g2); g2.connect(sfxGain);
      o2.start(now); o2.stop(now + 0.03);
      break;
    }
    case 'hit': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(300, now);
      o.frequency.exponentialRampToValueAtTime(60, now + 0.12);
      g.gain.setValueAtTime(0.1 * vol, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      o.connect(g); g.connect(sfxGain);
      o.start(now); o.stop(now + 0.12);
      // Impact crunch
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 3) * 0.5;
      const s = audioCtx.createBufferSource(); s.buffer = buf;
      const g2 = audioCtx.createGain(); g2.gain.value = 0.08 * vol;
      s.connect(g2); g2.connect(sfxGain);
      s.start(now);
      break;
    }
    case 'explode': {
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.4, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.5);
      const s = audioCtx.createBufferSource(); s.buffer = buf;
      const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 600;
      const g = audioCtx.createGain(); g.gain.setValueAtTime(0.18 * vol, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      s.connect(f); f.connect(g); g.connect(sfxGain);
      s.start(now);
      // Sub bass thump
      const o = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(80, now);
      o.frequency.exponentialRampToValueAtTime(20, now + 0.3);
      g2.gain.setValueAtTime(0.15 * vol, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      o.connect(g2); g2.connect(sfxGain);
      o.start(now); o.stop(now + 0.3);
      break;
    }
    case 'powerup': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(400, now);
      o.frequency.setValueAtTime(600, now + 0.05);
      o.frequency.setValueAtTime(800, now + 0.1);
      o.frequency.setValueAtTime(1200, now + 0.15);
      g.gain.setValueAtTime(0.1 * vol, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      o.connect(g); g.connect(sfxGain);
      o.start(now); o.stop(now + 0.25);
      // Shimmer
      const o2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      o2.type = 'triangle';
      o2.frequency.setValueAtTime(1600, now + 0.05);
      o2.frequency.exponentialRampToValueAtTime(2400, now + 0.2);
      g2.gain.setValueAtTime(0.04 * vol, now + 0.05);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      o2.connect(g2); g2.connect(sfxGain);
      o2.start(now + 0.05); o2.stop(now + 0.25);
      break;
    }
    case 'bomb': {
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.6, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.2);
      const s = audioCtx.createBufferSource(); s.buffer = buf;
      const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 400;
      const g = audioCtx.createGain(); g.gain.setValueAtTime(0.25 * vol, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
      s.connect(f); f.connect(g); g.connect(sfxGain);
      s.start(now);
      // Sub
      const o = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(60, now);
      o.frequency.exponentialRampToValueAtTime(15, now + 0.5);
      g2.gain.setValueAtTime(0.2 * vol, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      o.connect(g2); g2.connect(sfxGain);
      o.start(now); o.stop(now + 0.5);
      break;
    }
    case 'die': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(500, now);
      o.frequency.exponentialRampToValueAtTime(30, now + 0.8);
      g.gain.setValueAtTime(0.12 * vol, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
      o.connect(g); g.connect(sfxGain);
      o.start(now); o.stop(now + 0.8);
      // Reverb-like tail
      const o2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(200, now + 0.1);
      o2.frequency.exponentialRampToValueAtTime(40, now + 0.6);
      g2.gain.setValueAtTime(0.06 * vol, now + 0.1);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
      o2.connect(g2); g2.connect(sfxGain);
      o2.start(now + 0.1); o2.stop(now + 0.6);
      break;
    }
    case 'boss': {
      // Dramatic warning chord
      [80, 100, 120].forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'square';
        o.frequency.setValueAtTime(f, now + i * 0.12);
        g.gain.setValueAtTime(0.08 * vol, now + i * 0.12);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.5 + i * 0.1);
        o.connect(g); g.connect(sfxGain);
        o.start(now + i * 0.12); o.stop(now + 0.5 + i * 0.1);
      });
      break;
    }
    case 'combo': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(800 + combo * 40, now);
      o.frequency.exponentialRampToValueAtTime(1200 + combo * 60, now + 0.08);
      g.gain.setValueAtTime(0.06 * vol, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      o.connect(g); g.connect(sfxGain);
      o.start(now); o.stop(now + 0.1);
      break;
    }
    case 'menuSelect': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(660, now);
      o.frequency.setValueAtTime(880, now + 0.06);
      g.gain.setValueAtTime(0.08 * vol, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      o.connect(g); g.connect(sfxGain);
      o.start(now); o.stop(now + 0.12);
      break;
    }
  }
}

// --- SCREEN FLASH ---
function screenFlash(color, duration) {
  const el = document.getElementById('flash-overlay');
  el.style.background = color;
  el.style.opacity = '0.3';
  el.style.transition = 'opacity 0.05s';
  setTimeout(() => {
    el.style.transition = `opacity ${duration || 200}ms`;
    el.style.opacity = '0';
  }, 30);
}

// --- COMBO POPUP ---
let popupId = 0;
function showComboPopup(text, color, x, y) {
  const el = document.createElement('div');
  el.className = 'combo-float';
  el.textContent = text;
  el.style.color = color;
  el.style.fontSize = text.length > 10 ? '14px' : '18px';
  // Convert game coords to screen coords
  const screenX = offX + x * scale;
  const screenY = offY + y * scale;
  el.style.left = screenX + 'px';
  el.style.top = screenY + 'px';
  el.style.transform = 'translateX(-50%)';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// --- HAPTIC FEEDBACK ---
function haptic(ms) {
  if (navigator.vibrate) navigator.vibrate(ms || 10);
}

// --- PIXEL FONT ---
const FONT_DATA = {};
function initFont() {
  const chars = {
    'A':[0x04,0x0A,0x11,0x1F,0x11,0x11,0x11],'B':[0x1E,0x11,0x11,0x1E,0x11,0x11,0x1E],
    'C':[0x0E,0x11,0x10,0x10,0x10,0x11,0x0E],'D':[0x1C,0x12,0x11,0x11,0x11,0x12,0x1C],
    'E':[0x1F,0x10,0x10,0x1E,0x10,0x10,0x1F],'F':[0x1F,0x10,0x10,0x1E,0x10,0x10,0x10],
    'G':[0x0E,0x11,0x10,0x17,0x11,0x11,0x0F],'H':[0x11,0x11,0x11,0x1F,0x11,0x11,0x11],
    'I':[0x0E,0x04,0x04,0x04,0x04,0x04,0x0E],'J':[0x07,0x02,0x02,0x02,0x02,0x12,0x0C],
    'K':[0x11,0x12,0x14,0x18,0x14,0x12,0x11],'L':[0x10,0x10,0x10,0x10,0x10,0x10,0x1F],
    'M':[0x11,0x1B,0x15,0x15,0x11,0x11,0x11],'N':[0x11,0x19,0x15,0x13,0x11,0x11,0x11],
    'O':[0x0E,0x11,0x11,0x11,0x11,0x11,0x0E],'P':[0x1E,0x11,0x11,0x1E,0x10,0x10,0x10],
    'Q':[0x0E,0x11,0x11,0x11,0x15,0x12,0x0D],'R':[0x1E,0x11,0x11,0x1E,0x14,0x12,0x11],
    'S':[0x0E,0x11,0x10,0x0E,0x01,0x11,0x0E],'T':[0x1F,0x04,0x04,0x04,0x04,0x04,0x04],
    'U':[0x11,0x11,0x11,0x11,0x11,0x11,0x0E],'V':[0x11,0x11,0x11,0x11,0x0A,0x0A,0x04],

function drawText(text, x, y, size, color, align) {
  text = String(text).toUpperCase();
  const charW = 5 * size + size;
  let totalW = text.length * charW - size;
  let sx = align === 'center' ? x - totalW / 2 : align === 'right' ? x - totalW : x;
  X.fillStyle = color || '#fff';
  for (let c = 0; c < text.length; c++) {
    const rows = FONT_DATA[text[c]];
    if (!rows) { sx += charW; continue; }
    for (let r = 0; r < 7; r++) {
      for (let b = 0; b < 5; b++) {
        if (rows[r] & (1 << (4 - b))) {
          X.fillRect(sx + b * size, y + r * size, size, size);
        }
      }
    }
    sx += charW;
  }
}

// Glow text helper
function drawGlowText(text, x, y, size, color, align, glowSize) {
  X.save();
  X.shadowColor = color;
  X.shadowBlur = glowSize || 8;
  drawText(text, x, y, size, color, align);
  X.restore();
}

joyZone.addEventListener('touchstart', e => {

function handleJoyTouch(touch) {
  const rect = joyBase.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const dx = touch.clientX - cx;
  const maxR = rect.width / 2;
  const clampedX = Math.max(-maxR, Math.min(maxR, dx));
  joyX = clampedX / maxR;
  joyKnob.style.transform = `translateX(${clampedX * 0.7}px)`;
}

}
function updateStars() {
  for (const s of stars) {
    s.y += s.speed;

}

// --- PARTICLES ---
function spawnParticles(x, y, count, color, speed, life) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * speed;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: life || 30, maxLife: life || 30, color, size: 1 + Math.random() * 2 });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.97; p.vy *= 0.97;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    X.globalAlpha = p.life / p.maxLife;
    X.fillStyle = p.color;
    X.fillRect(Math.floor(p.x), Math.floor(p.y), Math.ceil(p.size), Math.ceil(p.size));
  }
  X.globalAlpha = 1;
}

// --- BULLET TRAILS ---
function updateBulletTrails() {
  for (let i = bulletTrails.length - 1; i >= 0; i--) {
    bulletTrails[i].life--;
    if (bulletTrails[i].life <= 0) bulletTrails.splice(i, 1);
  }
}
function drawBulletTrails() {
  for (const t of bulletTrails) {
    X.globalAlpha = (t.life / t.maxLife) * 0.4;
    X.fillStyle = t.color;
    X.fillRect(t.x, t.y, 1, 3);
  }
  X.globalAlpha = 1;
}

// --- WAVE GENERATION ---
function spawnWave() {
  wave++;
  waveCleared = false;
  waveTimer = 60;
  const isBoss = wave % 10 === 0;
  if (isBoss) {
    bossActive = true;
    const baseHp = 80 + (Math.floor(wave / 10) - 1) * 40;
    boss = { x: GW/2, y: -60, targetY: 80, hp: baseHp, maxHp: baseHp, phase: 0, timer: 0, frame: 0, vx: 1.2 * difficultyMod };
    playSound('boss');
    screenFlash('#ff2244', 400);
    return;
  }
  difficultyMod = 1 + (wave - 1) * 0.06;
  const patternIndex = (wave - 1) % 12;
  const eType = Math.min(3, Math.floor((wave - 1) / 5));
  const count = Math.min(30, 6 + wave);
  const spd = (0.5 + wave * 0.08) * difficultyMod;
  switch(patternIndex) {
    case 0: spawnGrid(count, eType, spd); break;
    case 1: spawnV(count, eType, spd); break;
    case 2: spawnCircle(count, eType, spd); break;
    case 3: spawnDoubleRow(count, eType, spd); break;
    case 4: spawnSideSwoop(count, eType, spd); break;
    case 5: spawnZigzag(count, eType, spd); break;
    case 6: spawnSpiral(count, eType, spd); break;
    case 7: spawnScatter(count, eType, spd); break;
    case 8: spawnDiamond(count, eType, spd); break;
    case 9: spawnCross(count, eType, spd); break;
    case 10: spawnColumns(count, eType, spd); break;
    case 11: spawnFunnel(count, eType, spd); break;
  }
}

function makeEnemy(x, y, type, hp, pattern, spd, delay) {
  return { x, y, type, hp, maxHp: hp, pattern, speed: spd, frame: 0, shootTimer: 120 + Math.random() * 180, delay: delay || 0, alive: true, entryTimer: 0 };
}

function spawnGrid(n, type, spd) {
  const cols = Math.min(8, n);
  const rows = Math.ceil(n / cols);
  const hp = type === 0 ? 1 : type === 1 ? 2 : type === 2 ? 4 : 3;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols && r * cols + c < n; c++) {
      enemies.push(makeEnemy(60 + c * 50, -30 - r * 30, type, hp, 'grid', spd, r * 15));
    }
  }
}
function spawnV(n, type, spd) {
  const hp = type === 0 ? 1 : 2;
  const half = Math.floor(n / 2);
  for (let i = 0; i <= half; i++) {
    enemies.push(makeEnemy(GW/2 - i * 30, -30 - i * 20, type, hp, 'grid', spd, i * 8));
    if (i > 0) enemies.push(makeEnemy(GW/2 + i * 30, -30 - i * 20, type, hp, 'grid', spd, i * 8));
  }
}
function spawnCircle(n, type, spd) {
  const hp = type <= 1 ? 2 : 3;
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2;
    enemies.push(makeEnemy(GW/2 + Math.cos(a) * 100, -50, type, hp, 'circle', spd, i * 5));
    const e = enemies[enemies.length-1];
    e.circleAngle = a; e.circleCx = GW/2; e.circleCy = 180; e.circleR = 80 + Math.random() * 30;
  }
}
function spawnDoubleRow(n, type, spd) {
  const half = Math.floor(n / 2);
  for (let i = 0; i < half; i++) {
    enemies.push(makeEnemy(40 + i * 55, -30, type, 2, 'grid', spd, i * 5));
    enemies.push(makeEnemy(40 + i * 55, -60, type, 2, 'grid', spd, i * 5 + half * 3));
  }
}
function spawnSideSwoop(n, type, spd) {
  for (let i = 0; i < n; i++) {
    const fromLeft = i % 2 === 0;
    enemies.push(makeEnemy(fromLeft ? -20 : GW + 20, -20 - i * 15, type, 2, 'swoop', spd * 1.5, i * 12));
    const e = enemies[enemies.length-1]; e.swoopDir = fromLeft ? 1 : -1; e.swoopPhase = 0;
  }
}
function spawnZigzag(n, type, spd) {
  for (let i = 0; i < n; i++) {
    enemies.push(makeEnemy(GW/2, -30 - i * 25, type, 2, 'zigzag', spd, i * 8));
    const e = enemies[enemies.length-1]; e.zigTimer = 0; e.zigDir = i % 2 === 0 ? 1 : -1;
  }
}
function spawnSpiral(n, type, spd) {
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 4;
    enemies.push(makeEnemy(GW/2, -50, type, 2, 'circle', spd, i * 6));
    const e = enemies[enemies.length-1];
    e.circleAngle = a; e.circleCx = GW/2; e.circleCy = 200; e.circleR = 40 + i * 6;
  }
}
function spawnScatter(n, type, spd) {
  for (let i = 0; i < n; i++) {
    enemies.push(makeEnemy(40 + Math.random() * (GW - 80), -30 - Math.random() * 200, type, 2, 'grid', spd, i * 4));
  }
}
function spawnDiamond(n, type, spd) {
  const half = Math.floor(n / 4);
  for (let i = 0; i <= half; i++) {
    enemies.push(makeEnemy(GW/2 - i * 25, -30 - i * 25, type, 2, 'grid', spd, i * 6));
    if(i>0) enemies.push(makeEnemy(GW/2 + i * 25, -30 - i * 25, type, 2, 'grid', spd, i * 6));
    enemies.push(makeEnemy(GW/2 - i * 25, -30 - (half*2-i) * 25, type, 2, 'grid', spd, i * 6 + half*4));
    if(i>0) enemies.push(makeEnemy(GW/2 + i * 25, -30 - (half*2-i) * 25, type, 2, 'grid', spd, i * 6 + half*4));
  }
}
function spawnCross(n, type, spd) {
  const arm = Math.floor(n / 4);
  for (let i = 0; i < arm; i++) {
    enemies.push(makeEnemy(GW/2, -30 - i * 30, type, 2, 'grid', spd, i * 5));
    enemies.push(makeEnemy(30 + i * 50, -30 - arm * 15, type, 2, 'grid', spd, i * 5));
  }
}
function spawnColumns(n, type, spd) {
  const half = Math.floor(n / 2);
  for (let i = 0; i < half; i++) {
    enemies.push(makeEnemy(GW * 0.25, -30 - i * 28, type, 2, 'grid', spd, i * 6));
    enemies.push(makeEnemy(GW * 0.75, -30 - i * 28, type, 2, 'grid', spd, i * 6 + 3));
  }
}
function spawnFunnel(n, type, spd) {
  for (let i = 0; i < n; i++) {
    const t = i / n;
    const spread = (1 - t) * 180;
    enemies.push(makeEnemy(GW/2 + (Math.random()-0.5) * spread, -30 - i * 22, type, 2, 'grid', spd, i * 5));
  }
}

// --- SHOOTING ---
function playerShoot() {
  playSound('shoot');
  const px = player.x, py = player.y;
  const bSpd = 7;
  switch(weaponLevel) {
    case 0: bullets.push({x:px, y:py-14, vx:0, vy:-bSpd, dmg:1}); break;
    case 1:
      bullets.push({x:px-4, y:py-12, vx:0, vy:-bSpd, dmg:1});
      bullets.push({x:px+4, y:py-12, vx:0, vy:-bSpd, dmg:1}); break;
    case 2:
      bullets.push({x:px, y:py-14, vx:0, vy:-bSpd, dmg:1});
      bullets.push({x:px-6, y:py-10, vx:-1.2, vy:-bSpd, dmg:1});
      bullets.push({x:px+6, y:py-10, vx:1.2, vy:-bSpd, dmg:1}); break;
    default:
      bullets.push({x:px-3, y:py-14, vx:0, vy:-bSpd, dmg:1});
      bullets.push({x:px+3, y:py-14, vx:0, vy:-bSpd, dmg:1});
      bullets.push({x:px-8, y:py-8, vx:-1.8, vy:-bSpd, dmg:1});
      bullets.push({x:px+8, y:py-8, vx:1.8, vy:-bSpd, dmg:1}); break;
  }
}

function useBomb() {
  if (bombs <= 0 || state !== 'playing') return;
  bombs--;
  playSound('bomb');
  shake(12, 20);
  screenFlash('#ffffff', 300);
  haptic(50);
  for (const e of enemies) {
    if (e.alive && e.y > 0) {
      e.hp = 0; e.alive = false;
      score += 10 * multiplier;
      enemiesKilled++;
      spawnParticles(e.x, e.y, 12, '#ffaa00', 4, 25);
    }
  }
  eBullets.length = 0;
  spawnParticles(GW/2, GH/2, 80, '#fff', 8, 25);
  spawnParticles(GW/2, GH/2, 40, '#00e5ff', 6, 20);
  if (bossActive && boss) {
    boss.hp -= 20;
    if (boss.hp <= 0) bossDefeated();
  }
}

function bossDefeated() {
  bossActive = false;
  score += 500 * multiplier;
  shake(15, 25);
  playSound('explode');
  screenFlash('#ff4444', 500);
  haptic(80);
  spawnParticles(boss.x, boss.y, 80, '#ff4444', 6, 40);
  spawnParticles(boss.x, boss.y, 40, '#ffcc00', 5, 35);
  spawnParticles(boss.x, boss.y, 30, '#fff', 4, 30);
  powerups.push({ x: boss.x - 20, y: boss.y, type: 'weapon', frame: 0 });
  powerups.push({ x: boss.x + 20, y: boss.y, type: 'bomb', frame: 0 });
  if (Math.random() > 0.5) powerups.push({ x: boss.x, y: boss.y + 10, type: 'shield', frame: 0 });
  boss = null;
  waveCleared = true;
  showComboPopup('BOSS DEFEATED!', '#ffcc00', GW/2, GH/2 - 50);
}

// --- COLLISION ---
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax - aw/2 < bx + bw/2 && ax + aw/2 > bx - bw/2 && ay - ah/2 < by + bh/2 && ay + ah/2 > by - bh/2;
}

// --- PLAYER HIT ---
function playerHit() {
  if (player.invuln > 0) return;
  if (hasShield) {
    hasShield = false;
    player.invuln = 30;
    playSound('hit');
    spawnParticles(player.x, player.y, 15, '#00ffaa', 3, 20);
    screenFlash('#00ffaa', 150);
    haptic(20);
    return;
  }
  lives--;
  weaponLevel = 0;
  hasShield = false;
  speedBoost = false;
  player.invuln = 120;
  playSound('die');
  shake(10, 15);
  screenFlash('#ff0000', 300);
  haptic(60);
  spawnParticles(player.x, player.y, 30, '#00e5ff', 5, 30);
  if (lives <= 0) {
    stopBGM();
    state = 'entering_name';
    if (score > highScore) highScore = score;
    if (wave > bestWave) bestWave = wave;
  }
}

// --- LEADERBOARD (Firebase Realtime Database) ---
// ▸ Replace this URL with your Firebase Realtime Database URL
const FIREBASE_DB = 'https://revenge-of-the-basco-default-rtdb.firebaseio.com';
const LB_PATH = '/sigma-strike-leaderboard';

async function loadLeaderboard() {
  // Try Firebase first
  try {
    const res = await fetch(`${FIREBASE_DB}${LB_PATH}.json?orderBy="score"&limitToLast=10`);
    if (res.ok) {
      const data = await res.json();
      if (data) {
        leaderboard = Object.values(data).sort((a,b) => b.score - a.score).slice(0, 10);
        if (leaderboard.length > 0) highScore = leaderboard[0].score;
        // Mirror to localStorage
        try { localStorage.setItem('sigma_lb', JSON.stringify(leaderboard)); } catch(e) {}
        return;
      }
    }
  } catch(e) {}
  // Fallback: localStorage
  try {
    const stored = localStorage.getItem('sigma_lb');
    if (stored) {
      leaderboard = JSON.parse(stored).sort((a,b) => b.score - a.score).slice(0, 10);
      if (leaderboard.length > 0) highScore = leaderboard[0].score;
    }
  } catch(e) { leaderboard = []; }
}

async function saveScore(name) {
  const entry = { name: name.substring(0,12), score, wave, kills: enemiesKilled, date: new Date().toISOString().slice(0,10) };
  // Save to Firebase
  try {
    await fetch(`${FIREBASE_DB}${LB_PATH}.json`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry)
    });
  } catch(e) {}
  // Also save locally
  leaderboard.push(entry);
  leaderboard.sort((a,b) => b.score - a.score);
  leaderboard = leaderboard.slice(0, 10);
  if (leaderboard.length > 0) highScore = leaderboard[0].score;
  try { localStorage.setItem('sigma_lb', JSON.stringify(leaderboard)); } catch(e) {}
  await loadLeaderboard();
}

// --- UPDATE ---
let shootCooldown = 0;
let frameCount = 0;

function update() {
  frameCount++;
  titlePulse += 0.03;

  if (state === 'title' || state !== 'playing') { updateStars(); return; }

  updateStars();
  updateParticles();
  updateBulletTrails();

  // Player movement
  const spd = player.speed * (speedBoost ? 1.7 : 1);
  if (keys['ArrowLeft'] || keys['KeyA'] || joyX < -0.2) player.x -= spd * (joyActive ? Math.abs(joyX) : 1);
  if (keys['ArrowRight'] || keys['KeyD'] || joyX > 0.2) player.x += spd * (joyActive ? Math.abs(joyX) : 1);
  player.x = Math.max(14, Math.min(GW - 14, player.x));
  if (player.invuln > 0) player.invuln--;
  if (speedBoost) { speedTimer--; if (speedTimer <= 0) speedBoost = false; }

  const isMobile = 'ontouchstart' in window;

  // Shooting
  if (shootCooldown > 0) shootCooldown--;
  if ((keys['Space'] || isMobile) && shootCooldown <= 0) {
    playerShoot();
    shootCooldown = weaponLevel >= 3 ? 6 : weaponLevel >= 2 ? 7 : 8;
  }

  // Bomb
  if (keys['KeyB']) { keys['KeyB'] = false; useBomb(); }

  // Pause
  if (keys['KeyP'] || keys['Escape']) {
    keys['KeyP'] = false; keys['Escape'] = false;
    state = 'paused'; return;
  }

  // Tutorial dismiss
  if (showTutorial && !tutorialDismissed && frameCount > 180) {
    tutorialDismissed = true;
  }

  // Combo timer
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) { combo = 0; multiplier = 1; }
  }

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    // Trail
    if (frameCount % 2 === 0) bulletTrails.push({ x: b.x, y: b.y, life: 6, maxLife: 6, color: '#00ffcc' });
    b.x += b.vx; b.y += b.vy;
    if (b.y < -10 || b.x < -10 || b.x > GW + 10) { bullets.splice(i, 1); continue; }

    let hit = false;
    for (const e of enemies) {
      if (!e.alive || e.delay > 0) continue;
      if (rectsOverlap(b.x, b.y, 4, 8, e.x, e.y, 16, 14)) {
        e.hp -= b.dmg;
        hit = true;
        spawnParticles(b.x, b.y, 4, '#fff', 2, 10);
        if (e.hp <= 0) {
          e.alive = false;
          enemiesKilled++;
          combo++; comboTimer = 90;
          const oldMult = multiplier;
          multiplier = Math.min(8, 1 + Math.floor(combo / 5));
          score += (10 + e.maxHp * 5) * multiplier;
          playSound('hit');
          spawnParticles(e.x, e.y, 15, '#ff8844', 4, 25);
          // Combo popups
          if (combo === 5) showComboPopup('COMBO X2!', '#ffcc00', e.x, e.y - 20);
          else if (combo === 10) showComboPopup('COMBO X3!', '#ff8800', e.x, e.y - 20);
          else if (combo === 15) showComboPopup('MEGA COMBO!', '#ff4444', e.x, e.y - 20);
          else if (combo === 25) showComboPopup('ULTRA COMBO!', '#ff00ff', e.x, e.y - 20);
          else if (combo > 25 && combo % 10 === 0) { showComboPopup('X' + multiplier + ' INSANE!', '#00ffff', e.x, e.y - 20); playSound('combo'); }
          if (multiplier > oldMult) playSound('combo');
          // Drop?
          if (Math.random() < 0.08) {
            const types = ['weapon','weapon','weapon','shield','speed','bomb'];
            const t = types[Math.floor(Math.random() * types.length)];
            powerups.push({ x: e.x, y: e.y, type: t, frame: 0 });
          }
        }
        break;
      }
    }
    if (!hit && bossActive && boss) {
      if (rectsOverlap(b.x, b.y, 4, 8, boss.x, boss.y, 60, 60)) {
        boss.hp -= b.dmg;
        hit = true;
        spawnParticles(b.x, b.y, 3, '#fff', 2, 8);
        if (boss.hp <= 0) bossDefeated();
      }
    }
    if (hit) bullets.splice(i, 1);
  }

  // Enemy bullets
  for (let i = eBullets.length - 1; i >= 0; i--) {
    const b = eBullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.y > GH + 10 || b.y < -10 || b.x < -10 || b.x > GW + 10) { eBullets.splice(i, 1); continue; }
    if (rectsOverlap(b.x, b.y, 6, 6, player.x, player.y, 12, 14)) {
      eBullets.splice(i, 1);
      playerHit();
    }
  }

  // Enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.alive) { enemies.splice(i, 1); continue; }
    if (e.delay > 0) { e.delay--; continue; }
    e.frame++;
    e.entryTimer++;
    switch(e.pattern) {
      case 'grid':
        if (e.y < 60 + (enemies.indexOf(e) % 5) * 30) {
          e.y += e.speed * 1.5;
        } else {
          e.x += Math.sin(frameCount * 0.02 + i * 0.5) * e.speed * 0.8;
          e.y += Math.sin(frameCount * 0.01 + i) * 0.2;
        }
        break;
      case 'circle':
        if (e.entryTimer < 60) {
          const tx = e.circleCx + Math.cos(e.circleAngle) * e.circleR;
          const ty = e.circleCy + Math.sin(e.circleAngle) * e.circleR;
          e.x += (tx - e.x) * 0.04;
          e.y += (ty - e.y) * 0.04;
        } else {
          e.circleAngle += 0.015 * e.speed;
          e.x = e.circleCx + Math.cos(e.circleAngle) * e.circleR;
          e.y = e.circleCy + Math.sin(e.circleAngle) * e.circleR;
        }
        break;
      case 'swoop':
        e.swoopPhase += 0.02;
        e.x += e.swoopDir * e.speed * 2;
        e.y += Math.sin(e.swoopPhase * 3) * 2;
        if (e.swoopPhase > Math.PI) { e.swoopDir *= -1; e.swoopPhase = 0; }
        break;
      case 'zigzag':
        e.zigTimer++;
        e.y += e.speed * 0.5;
        e.x += e.zigDir * e.speed * 1.5;
        if (e.zigTimer > 40) { e.zigDir *= -1; e.zigTimer = 0; }
        break;
    }
    e.x = Math.max(10, Math.min(GW - 10, e.x));
    e.shootTimer -= difficultyMod;
    if (e.shootTimer <= 0 && e.y > 0 && e.y < GH * 0.7) {
      e.shootTimer = 100 + Math.random() * 150;
      const angle = Math.atan2(player.y - e.y, player.x - e.x);
      eBullets.push({ x: e.x, y: e.y + 8, vx: Math.cos(angle) * 2.5 * difficultyMod, vy: Math.sin(angle) * 2.5 * difficultyMod });
    }
    if (e.y > 0 && rectsOverlap(e.x, e.y, 14, 14, player.x, player.y, 12, 14)) {
      playerHit();
      e.hp -= 2;
      if (e.hp <= 0) { e.alive = false; enemiesKilled++; score += 5; spawnParticles(e.x, e.y, 10, '#ff8844', 3, 20); }
    }
    if (e.y > GH + 40) enemies.splice(i, 1);
  }

  // Boss
  if (bossActive && boss) {
    boss.frame++;
    if (boss.y < boss.targetY) {
      boss.y += 1;
    } else {
      boss.x += boss.vx;
      if (boss.x < 60 || boss.x > GW - 60) boss.vx *= -1;
      boss.timer++;
      if (boss.timer % 30 === 0) {
        for (let a = -2; a <= 2; a++) {
          const angle = Math.PI / 2 + a * 0.25;
          eBullets.push({ x: boss.x, y: boss.y + 20, vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3 });
        }
      }
      if (boss.timer % 90 === 0 && boss.hp < boss.maxHp * 0.5) {
        const angle = Math.atan2(player.y - boss.y, player.x - boss.x);
        for (let i = 0; i < 3; i++) {
          setTimeout(() => {
            if (bossActive) eBullets.push({ x: boss.x, y: boss.y + 20, vx: Math.cos(angle) * 4, vy: Math.sin(angle) * 4 });
          }, i * 100);
        }
      }
    }
  }

  // Powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += 1.2;
    p.frame++;
    if (p.y > GH + 20) { powerups.splice(i, 1); continue; }
    if (rectsOverlap(p.x, p.y, 14, 14, player.x, player.y, 20, 20)) {
      playSound('powerup');
      haptic(15);
      const labels = { weapon: 'WEAPON UP!', shield: 'SHIELD!', speed: 'SPEED BOOST!', bomb: '+1 BOMB!' };
      const colors = { weapon: '#00ff88', shield: '#00ccff', speed: '#ffcc00', bomb: '#ff4444' };
      showComboPopup(labels[p.type], colors[p.type], p.x, p.y - 15);
      switch(p.type) {
        case 'weapon': weaponLevel = Math.min(3, weaponLevel + 1); break;
        case 'shield': hasShield = true; break;
        case 'speed': speedBoost = true; speedTimer = 300; break;
        case 'bomb': bombs = Math.min(3, bombs + 1); break;
      }
      spawnParticles(p.x, p.y, 10, '#fff', 3, 15);
      powerups.splice(i, 1);
    }
  }

  // Wave management
  if (waveCleared || (enemies.length === 0 && !bossActive)) {
    waveCleared = true;
    waveTimer--;
    if (waveTimer <= 0) spawnWave();
  }
}

// --- DRAW ---
function draw() {
  // Background gradient
  const grad = X.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, '#060612');
  grad.addColorStop(0.5, '#0a0a1a');
  grad.addColorStop(1, '#0d0818');
  X.fillStyle = grad;
  X.fillRect(0, 0, GW, GH);

  // Subtle nebula glow
  X.save();
  X.globalAlpha = 0.03;
  X.fillStyle = '#3344ff';
  X.beginPath();
  X.arc(GW * 0.3, GH * 0.3, 150, 0, Math.PI * 2);
  X.fill();
  X.fillStyle = '#ff2266';
  X.beginPath();
  X.arc(GW * 0.75, GH * 0.6, 120, 0, Math.PI * 2);
  X.fill();
  X.restore();

  drawStars();
  updateShake();

  if (state === 'title') { drawTitleScreen(); endShake(); return; }
  if (state === 'entering_name' || state === 'gameover') { drawGameOverScreen(); endShake(); return; }

  // Draw game
  drawBulletTrails();
  for (const p of powerups) drawPowerup(p.x, p.y, p.type, p.frame);

  // Enemy bullets with glow
  for (const b of eBullets) {
    X.save();
    X.shadowColor = '#ff4444';
    X.shadowBlur = 6;
    X.fillStyle = '#ff6666';
    X.fillRect(b.x - 2, b.y - 2, 4, 4);
    X.restore();
    X.fillStyle = '#ff9999';
    X.fillRect(b.x - 1, b.y - 1, 2, 2);
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive || e.delay > 0) continue;
    drawEnemyFns[e.type](e.x, e.y, e.frame);
    if (e.maxHp > 2 && e.hp < e.maxHp) {
      X.fillStyle = '#333';
      X.fillRect(e.x - 8, e.y + 10, 16, 2);
      X.fillStyle = '#ff4444';
      X.fillRect(e.x - 8, e.y + 10, 16 * (e.hp / e.maxHp), 2);
    }
  }

  // Boss
  if (bossActive && boss) drawBoss(boss.x, boss.y, boss.hp, boss.maxHp, boss.frame);

  // Player bullets with glow
  for (const b of bullets) {
    X.save();
    X.shadowColor = '#00ffcc';
    X.shadowBlur = 4;
    X.fillStyle = '#00ffcc';
    X.fillRect(b.x - 1, b.y - 3, 2, 6);
    X.restore();
    X.fillStyle = '#aaffee';
    X.fillRect(b.x, b.y - 2, 1, 4);
  }

  // Player
  if (player.invuln <= 0 || Math.floor(player.invuln / 3) % 2 === 0) {
    drawShip(player.x, player.y, hasShield);
  }

  drawParticles();
  drawHUD();

  // Tutorial overlay (first 3 seconds)
  if (showTutorial && !tutorialDismissed && wave === 1 && frameCount < 180) {
    X.fillStyle = 'rgba(0,0,0,0.5)';
    X.fillRect(0, GH - 120, GW, 60);
    const isMobile = 'ontouchstart' in window;
    if (isMobile) {
      drawText('JOYSTICK TO MOVE', GW/2, GH - 110, 1, '#00e5ff', 'center');
      drawText('AUTO-FIRE ENABLED', GW/2, GH - 95, 1, '#00ff88', 'center');
      drawText('TAP BOMB TO CLEAR SCREEN', GW/2, GH - 80, 1, '#ff6666', 'center');
    } else {
      drawText('ARROWS/AD MOVE  SPACE SHOOT', GW/2, GH - 110, 1, '#00e5ff', 'center');
      drawText('B BOMB  P PAUSE', GW/2, GH - 95, 1, '#00ff88', 'center');
      drawText('CHAIN KILLS FOR COMBO MULTIPLIER!', GW/2, GH - 80, 1, '#ffcc00', 'center');
    }
  }

  // Pause overlay
  if (state === 'paused') {
    X.fillStyle = 'rgba(0,0,0,0.7)';
    X.fillRect(0, 0, GW, GH);
    drawGlowText('PAUSED', GW/2, GH/2 - 30, 3, '#fff', 'center', 12);
    drawText('PRESS P TO RESUME', GW/2, GH/2 + 10, 1, '#666', 'center');
    drawText('SCORE ' + score, GW/2, GH/2 + 40, 1, '#aaa', 'center');
    drawText('WAVE ' + wave, GW/2, GH/2 + 55, 1, '#aaa', 'center');
  }

  endShake();
}

function drawHUD() {
  // Score with glow on high multiplier
  if (multiplier > 3) {
    drawGlowText('SCORE ' + score, 8, 8, 1, '#fff', null, 4);
  } else {
    drawText('SCORE ' + score, 8, 8, 1, '#fff');
  }

  // High score
  if (highScore > 0) {
    drawText('HI ' + highScore, GW/2, 8, 1, '#666', 'center');
  }

  // Multiplier
  if (multiplier > 1) {
    const mCol = multiplier >= 6 ? '#ff00ff' : multiplier >= 4 ? '#ff4444' : '#ffcc00';
    drawGlowText('X' + multiplier, 8, 22, 1.5, mCol, null, multiplier > 4 ? 8 : 0);
    // Combo bar
    const barW = 50;
    const barFill = comboTimer / 90;
    X.fillStyle = '#222';
    X.fillRect(8, 36, barW, 3);
    X.fillStyle = mCol;
    X.fillRect(8, 36, barW * barFill, 3);
  }

  // Wave
  drawText('WAVE ' + wave, GW - 8, 8, 1, '#aaa', 'right');

  // Lives
  for (let i = 0; i < lives; i++) drawShipMini(12 + i * 18, 48);

  // Bombs
  for (let i = 0; i < bombs; i++) {
    X.fillStyle = '#ff4444';
    X.fillRect(GW - 16 - i * 14, 22, 8, 8);
    X.fillStyle = '#ff8888';
    X.fillRect(GW - 14 - i * 14, 24, 4, 4);
  }

  // Weapon level
  const wNames = ['SINGLE', 'DOUBLE', 'SPREAD', 'QUAD'];
  drawText(wNames[weaponLevel], 8, 60, 1, '#00ff88');
  if (hasShield) drawText('SHIELD', 8, 72, 1, '#00ccff');
  if (speedBoost) drawText('SPEED!', 8, hasShield ? 84 : 72, 1, '#ffcc00');

  // Wave announcement
  if (waveTimer > 30 && state === 'playing') {
    X.globalAlpha = (waveTimer - 30) / 30;
    if (wave % 10 === 0) {
      drawGlowText('WARNING', GW/2, GH/2 - 30, 3, '#ff2244', 'center', 15);
      drawGlowText('BOSS INCOMING', GW/2, GH/2 + 10, 2, '#ff4466', 'center', 10);
    } else {
      drawGlowText('WAVE ' + wave, GW/2, GH/2 - 10, 3, '#fff', 'center', 10);
    }
    X.globalAlpha = 1;
  }
}

function drawTitleScreen() {
  // Animated sigma symbol background
  X.save();
  X.globalAlpha = 0.04 + Math.sin(titlePulse * 0.5) * 0.02;
  X.fillStyle = '#00e5ff';
  const s = 140;
  const cx = GW/2, cy = GH/2 - 60;
  X.fillRect(cx-s/2, cy-s/2, s, s/8);
  X.fillRect(cx-s/2, cy-s/2, s/8, s/3);
  X.fillRect(cx-s/2+s/8, cy-s/2+s/3-s/8, s/3, s/8);
  X.fillRect(cx-s/2, cy+s/6, s/8, s/3);
  X.fillRect(cx-s/2, cy+s/2-s/8, s, s/8);
  X.restore();

  // Floating particles on title
  if (frameCount % 4 === 0) {
    particles.push({ x: Math.random() * GW, y: GH + 5, vx: (Math.random() - 0.5) * 0.3, vy: -(0.5 + Math.random()), life: 80, maxLife: 80, color: Math.random() > 0.5 ? '#00e5ff' : '#0066aa', size: 1 });
  }
  updateParticles();
  drawParticles();

  // Title with glow
  const glow = Math.sin(titlePulse) * 0.3 + 0.7;
  X.globalAlpha = glow;
  X.save();
  X.shadowColor = '#00e5ff';
  X.shadowBlur = 20;
  drawText('SIGMA', GW/2, 130, 5, '#00e5ff', 'center');
  X.restore();
  drawText('STRIKE', GW/2, 178, 5, '#fff', 'center');
  X.globalAlpha = 1;

  // Tagline with typing effect
  drawText('DEFEND THE DISTRIBUTION', GW/2, 235, 1, '#4488aa', 'center');

  // Stats flavor text
  const flavorTexts = ['OUTLIERS WILL BE ELIMINATED', 'REJECT THE NULL HYPOTHESIS', 'P < 0.001', 'N = YOUR SKILL', 'STATISTICALLY SIGNIFICANT'];
  const flavorIdx = Math.floor(titlePulse * 0.3) % flavorTexts.length;
  X.globalAlpha = 0.4;
  drawText(flavorTexts[flavorIdx], GW/2, 255, 1, '#335566', 'center');
  X.globalAlpha = 1;

  // Ship preview
  drawShip(GW/2, 310, false);

  // Pulsing start
  const blink = Math.sin(titlePulse * 2) > 0;
  if (blink) {
    X.save();
    X.shadowColor = '#00e5ff';
    X.shadowBlur = 10;
    const isMobile = 'ontouchstart' in window;
    drawText(isMobile ? 'TAP TO START' : 'PRESS SPACE TO START', GW/2, 390, 1.5, '#fff', 'center');
    X.restore();
  }

  // Controls
  const isMobile = 'ontouchstart' in window;
  if (!isMobile) {
    drawText('ARROWS/AD - MOVE', GW/2, 435, 1, '#444', 'center');
    drawText('SPACE - SHOOT', GW/2, 450, 1, '#444', 'center');
    drawText('B - BOMB  P - PAUSE', GW/2, 465, 1, '#444', 'center');
  } else {
    drawText('JOYSTICK - MOVE', GW/2, 435, 1, '#444', 'center');
    drawText('AUTO-FIRE ENABLED', GW/2, 450, 1, '#444', 'center');
  }

  // Leaderboard
  if (leaderboard.length > 0) {
    drawText('HIGH SCORES', GW/2, 500, 1.5, '#ffcc00', 'center');
    for (let i = 0; i < Math.min(5, leaderboard.length); i++) {
      const e = leaderboard[i];
      const col = i === 0 ? '#ffcc00' : i < 3 ? '#ff8844' : '#888';
      drawText((i+1) + '. ' + e.name, 60, 525 + i * 16, 1, col);
      drawText(String(e.score), GW - 60, 525 + i * 16, 1, '#fff', 'right');
    }
  }

  // Version + credit
  drawText('V1.0', 8, GH - 12, 1, '#222');
  drawText('BY ANJANA YATAWARA', GW/2, GH - 12, 1, '#222', 'center');
}

function drawGameOverScreen() {
  X.fillStyle = 'rgba(0,0,0,0.75)';
  X.fillRect(0, 0, GW, GH);

  // Floating particles
  if (frameCount % 6 === 0) {
    particles.push({ x: Math.random() * GW, y: GH + 5, vx: 0, vy: -0.5, life: 60, maxLife: 60, color: '#ff444466', size: 1 });
  }
  updateParticles();
  drawParticles();

  drawGlowText('GAME OVER', GW/2, 80, 4, '#ff4444', 'center', 15);

  // Stats box
  X.strokeStyle = '#333';
  X.lineWidth = 1;
  X.strokeRect(GW/2 - 100, 120, 200, 100);

  drawText('SCORE', GW/2, 135, 1, '#888', 'center');
  drawGlowText(String(score), GW/2, 152, 2.5, '#fff', 'center', 6);
  drawText('WAVE ' + wave, GW/2 - 40, 185, 1, '#aaa', 'center');
  drawText('KILLS ' + enemiesKilled, GW/2 + 40, 185, 1, '#aaa', 'center');

  // Near-miss messaging (psychology: loss aversion)
  if (highScore > 0 && score < highScore && score > highScore * 0.7) {
    const diff = highScore - score;
    drawText('ONLY ' + diff + ' FROM HIGH SCORE!', GW/2, 205, 1, '#ffcc00', 'center');
  } else if (score >= highScore && score > 0) {
    drawGlowText('NEW HIGH SCORE!', GW/2, 205, 1, '#ffcc00', 'center', 8);
  }

  if (state === 'entering_name') {
    drawText('ENTER YOUR NAME', GW/2, 250, 1.5, '#ffcc00', 'center');
    X.strokeStyle = '#ffcc00';
    X.lineWidth = 1;
    X.strokeRect(GW/2 - 80, 270, 160, 24);
    const displayName = nameInput + (Math.sin(titlePulse * 3) > 0 ? '_' : '');
    drawText(displayName || '_', GW/2, 276, 2, '#fff', 'center');
    drawText('PRESS ENTER TO SUBMIT', GW/2, 305, 1, '#555', 'center');
  } else {
    // Leaderboard
    drawText('LEADERBOARD', GW/2, 250, 2, '#ffcc00', 'center');
    for (let i = 0; i < Math.min(10, leaderboard.length); i++) {
      const e = leaderboard[i];
      const col = i === 0 ? '#ffcc00' : i < 3 ? '#ff8844' : '#888';
      drawText((i+1) + '.', 70, 280 + i * 18, 1, col);
      drawText(e.name, 100, 280 + i * 18, 1, col);
      drawText(String(e.score), GW - 70, 280 + i * 18, 1, '#fff', 'right');
      drawText('W' + (e.wave||'?'), GW - 130, 280 + i * 18, 1, '#555', 'right');
    }

    // Share button area
    const shareY = 490;
    X.strokeStyle = '#00e5ff';
    X.lineWidth = 1;
    X.strokeRect(GW/2 - 60, shareY, 120, 20);
    drawText('SHARE SCORE', GW/2, shareY + 4, 1, '#00e5ff', 'center');

    const blink = Math.sin(titlePulse * 2) > 0;
    if (blink) {
      X.save();
      X.shadowColor = '#00e5ff';
      X.shadowBlur = 8;
      const isMobile = 'ontouchstart' in window;
      drawText(isMobile ? 'TAP TO PLAY AGAIN' : 'PRESS SPACE TO PLAY AGAIN', GW/2, GH - 50, 1, '#fff', 'center');
      X.restore();
    }
  }
}

// --- SHARE SCORE ---
function shareScore() {
  const text = `SIGMA STRIKE - Score: ${score} | Wave: ${wave} | Kills: ${enemiesKilled}\nDefend the Distribution! Play at yatawara.com`;
  if (navigator.share) {
    navigator.share({ title: 'Sigma Strike', text }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      showComboPopup('COPIED TO CLIPBOARD!', '#00e5ff', GW/2, GH/2);
    });
  }
}

// Share click detection
C.addEventListener('click', e => {
  if (state !== 'gameover') return;
  const rect = C.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / scale;
  const my = (e.clientY - rect.top) / scale;
  if (mx > GW/2 - 60 && mx < GW/2 + 60 && my > 490 && my < 510) {
    shareScore();
  }
});

// --- NAME INPUT HANDLER ---
window.addEventListener('keydown', e => {
  if (state === 'entering_name') {
    if (e.key === 'Enter' && nameInput.length > 0) {
      playSound('menuSelect');
      saveScore(nameInput).then(() => { state = 'gameover'; });
    } else if (e.key === 'Backspace') {
      nameInput = nameInput.slice(0, -1);
    } else if (e.key.length === 1 && nameInput.length < 12 && /[a-zA-Z0-9 _\-.]/.test(e.key)) {
      nameInput = nameInput + e.key.toUpperCase();
    }
    e.preventDefault();
  }
});

// --- MAIN LOOP ---
function gameLoop() {
  if (keys['Space']) {
    if (state === 'title') {
      initAudio();
      startBGM();
      initGame();
      state = 'playing';
      spawnWave();
      playSound('menuSelect');
      keys['Space'] = false;
    } else if (state === 'paused') {
      state = 'playing';
      keys['Space'] = false;
    } else if (state === 'gameover') {
      state = 'title';
      nameInput = '';
      keys['Space'] = false;
    }
  }
  if (keys['KeyP'] || keys['Escape']) {
    if (state === 'paused') {
      state = 'playing';
      keys['KeyP'] = false;
      keys['Escape'] = false;
    }
  }

  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Touch handlers for state transitions
C.addEventListener('touchstart', e => {
  initAudio();
  if (state === 'title') {
    startBGM();
    initGame();
    state = 'playing';
    spawnWave();
    playSound('menuSelect');
    haptic(20);
  } else if (state === 'gameover') {
    // Check share button tap
    const rect = C.getBoundingClientRect();
    const mx = (e.touches[0].clientX - rect.left) / scale;
    const my = (e.touches[0].clientY - rect.top) / scale;
    if (mx > GW/2 - 60 && mx < GW/2 + 60 && my > 490 && my < 510) {
      shareScore();
      return;
    }
    state = 'title';
    nameInput = '';
  }
}, { passive: true });

// Mobile name input via prompt
C.addEventListener('touchstart', e => {
  if (state === 'entering_name') {
    const name = prompt('Enter your name (max 12 chars):');
    if (name && name.trim().length > 0) {
      nameInput = name.trim().substring(0, 12).toUpperCase().replace(/[^A-Z0-9 _\-.]/g, '');
      if (nameInput.length > 0) {
        playSound('menuSelect');
        saveScore(nameInput).then(() => { state = 'gameover'; });
      }
    }
  }
}, { passive: true });

// Init
initStars();
particles = [];
bulletTrails = [];
bullets = [];
enemies = [];
eBullets = [];
powerups = [];
loadLeaderboard().finally(() => {
  gameLoop();
});
</script>
</body>
</html>
