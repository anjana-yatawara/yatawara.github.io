project:
  type: website

website:
  title: "Anjana Yatawara"
  description: "Assistant Professor of Mathematics & Statistics at California State University, Bakersfield. Research in financial econometrics, volatility modeling, AI in education, and environmental justice."
  site-url: "https://www.yatawara.com"
  favicon: images/favicon.png

  open-graph:
    locale: en_US
    site-name: "Anjana Yatawara"

  twitter-card:
    card-style: summary_large_image

  navbar:
    background: "#F7F6F3"
    foreground: "#2A2927"
    left:
      - text: Research
        href: research/index.qmd
      - text: Publications
        href: publications/index.qmd
      - text: Teaching
        href: teaching/index.qmd
      - text: Consulting
        href: consulting/consulting_page.qmd
      - text: KernelStats
        href: kernelstats/kernelstats_page.qmd
      - text: Games
        href: games/index.qmd
      - text: CV
        href: cv/index.qmd
      - text: Blog
        href: blog/index.qmd
    right:
      - icon: github
        href: https://github.com/anjana-yatawara
        aria-label: GitHub
      - icon: mortarboard-fill
        href: https://scholar.google.com/citations?user=n5WtVd0AAAAJ&hl=en&oi=ao
        aria-label: Google Scholar

  page-footer:
    center: |
      © 2026 Anjana Yatawara · Built with [Quarto](https://quarto.org)
    background: "#F7F6F3"

  page-navigation: true
  reader-mode: false

format:
  html:
    theme:
      light: [cosmo, styles/custom.scss]
    css: styles/extra.css
    toc: false
    code-tools: false
    smooth-scroll: true
    link-external-newwindow: true
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
          <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

execute:
  freeze: auto

google-scholar: true
