<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Building X'X one entry at a time</title>
<link rel="stylesheet" href="_engine.css">
</head>
<body>
<div id="sim"></div>
<script src="_engine.js"></script>
<script>
/* Chapter 6, section 6.2. Row-by-column multiplication, shown on the one
   product a regression actually needs: X'X for a small design matrix.
   Palette, stats and CSS come from the shared engine; the widget itself is a
   matrix grid, which none of the five plot primitives can express. */
(function () {
  'use strict';

  /* ---------- language ---------------------------------------------- */
  var m = /[?&]lang=([a-zA-Z]{2})/.exec(location.search);
  var lang = (m && m[1].toLowerCase() === 'es') ? 'es' : 'en';
  document.documentElement.setAttribute('lang', lang);
  function T(v) { return (typeof v === 'string') ? v : (v[lang] || v.en); }

  /* ---------- dom + palette + theme (mirrors the engine) ------------- */
  function el(tag, cls, parent) {
    var n = document.createElement(tag);
    if (cls) { n.className = cls; }
    if (parent) { parent.appendChild(n); }
    return n;
  }
  function pal() {
    var cs = getComputedStyle(document.documentElement);
    function g(name, fb) { var v = cs.getPropertyValue(name); return (v && v.trim()) || fb; }
    return {
      bg: g('--sim-bg', '#ffffff'), surface: g('--sim-surface', '#f5f5f7'),
      text: g('--sim-text', '#111113'), text2: g('--sim-text-2', '#2b2b2e'),
      hairline: g('--sim-hairline', '#d2d2d7'), accent: g('--sim-accent', '#0b5fcc'),
      accent2: g('--sim-accent-2', '#8a5300'), grid: g('--sim-grid', '#e6e6ea')
    };
  }
  var hooks = [];
  function redrawAll() {
    for (var i = 0; i < hooks.length; i++) { try { hooks[i](); } catch (e) { /* keep going */ } }
  }
  function wireTheme() {
    var root = document.documentElement;
    function apply(dark) {
      root.classList.toggle('sim-dark', !!dark);
      root.classList.toggle('sim-light', !dark);
      redrawAll();
    }
    try {
      if (window.parent && window.parent !== window) {
        var pel = window.parent.document.documentElement;
        var read = function () { return pel.classList.contains('dark'); };
        if (pel.classList.contains('dark') || pel.classList.contains('light')) { apply(read()); }
        new window.parent.MutationObserver(function () { apply(read()); })
          .observe(pel, { attributes: true, attributeFilter: ['class'] });
        return;
      }
    } catch (e) { /* cross-origin: the media query stays in charge */ }
    if (window.matchMedia) {
      var mq = window.matchMedia('(prefers-color-scheme: dark)');
      if (mq.addEventListener) { mq.addEventListener('change', redrawAll); }
      else if (mq.addListener) { mq.addListener(redrawAll); }
    }
  }

  function canvasIn(parent, opts) {
    var wrap = el('div', 'sim-plot-wrap', parent);
    var cv = el('canvas', 'sim-canvas', wrap);
    cv.setAttribute('role', 'img');
    cv.setAttribute('aria-label', opts.ariaLabel);
    cv.tabIndex = 0;
    var o = { wrap: wrap, canvas: cv, ctx: cv.getContext('2d'), w: 300, h: 220, pal: pal() };
    o.resize = function () {
      var cssW = wrap.clientWidth || 300;
      var ratio = (cssW < 420) ? opts.ratioNarrow : opts.ratioWide;
      var cssH = Math.max(opts.minHeight, Math.round(cssW * ratio));
      if (opts.maxHeight) { cssH = Math.min(cssH, opts.maxHeight); }
      var dpr = window.devicePixelRatio || 1;
      cv.style.height = cssH + 'px';
      cv.width = Math.round(cssW * dpr);
      cv.height = Math.round(cssH * dpr);
      o.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      o.w = cssW; o.h = cssH;
    };
    o.clear = function () {
      o.pal = pal();
      o.ctx.clearRect(0, 0, o.w, o.h);
      o.ctx.fillStyle = o.pal.surface;
      o.ctx.fillRect(0, 0, o.w, o.h);
    };
    o.pos = function (ev) {
      var r = cv.getBoundingClientRect();
      return { x: ev.clientX - r.left, y: ev.clientY - r.top };
    };
    return o;
  }

  function statBlock(root, defs) {
    var wrap = el('div', 'sim-readouts', root);
    var live = el('div', 'sim-sr', root);
    live.setAttribute('aria-live', 'polite');
    live.setAttribute('aria-atomic', 'true');
    var cells = {};
    defs.forEach(function (d) {
      var cell = el('div', 'sim-stat' + (d.accent === 2 ? ' is-accent-2' : d.accent ? ' is-accent' : ''), wrap);
      var lab = el('span', 'sim-stat-label', cell);
      lab.textContent = T(d.label);
      var val = el('span', 'sim-stat-value', cell);
      val.textContent = '--';
      cells[d.id] = { label: T(d.label), value: val };
    });
    return {
      set: function (id, text) { if (cells[id]) { cells[id].value.textContent = text; } },
      announce: function () {
        var parts = [];
        for (var k in cells) {
          if (Object.prototype.hasOwnProperty.call(cells, k)) {
            parts.push(cells[k].label + ' ' + cells[k].value.textContent);
          }
        }
        live.textContent = parts.join(', ');
      }
    };
  }

  function sliderBlock(root, params, onChange) {
    var wrap = el('div', 'sim-controls', root);
    var state = {};
    params.forEach(function (p) {
      state[p.id] = p.value;
      var row = el('div', 'sim-slider-row', wrap);
      var lab = el('label', 'sim-slider-label', row);
      var out = el('span', 'sim-slider-value', row);
      var inp = el('input', null, row);
      var id = 'sl-' + p.id + '-' + Math.random().toString(36).slice(2, 7);
      inp.type = 'range'; inp.id = id;
      inp.min = p.min; inp.max = p.max; inp.step = p.step; inp.value = p.value;
      lab.textContent = T(p.label);
      lab.setAttribute('for', id);
      function show() {
        out.textContent = Number(state[p.id]).toFixed(p.digits || 0);
        inp.setAttribute('aria-valuetext', out.textContent);
      }
      inp.addEventListener('input', function () {
        state[p.id] = parseFloat(inp.value); show(); onChange();
      });
      show();
    });
    return state;
  }

  function buttonBlock(root, defs) {
    var wrap = el('div', 'sim-buttons', root);
    defs.forEach(function (d) {
      var b = el('button', 'sim-btn' + (d.secondary ? ' is-secondary' : ''), wrap);
      b.type = 'button';
      b.textContent = T(d.text);
      b.addEventListener('click', d.onClick);
    });
  }

  function captionBlock(root, text) {
    var c = el('div', 'sim-caption', root);
    T(text).split(/\n\s*\n/).forEach(function (para) {
      var p = el('p', null, c);
      para.split(/\*\*/).forEach(function (bit, i) {
        if (i % 2) { var s = el('strong', null, p); s.textContent = bit; }
        else if (bit) { p.appendChild(document.createTextNode(bit)); }
      });
    });
  }

  /* ================================================================== */
  /* The widget                                                          */
  /* ================================================================== */

  var STR = {
    title: { en: "Build X'X one entry at a time",
             es: "Construye X'X entrada por entrada" },
    aria:  { en: "A 2 by 3 matrix X-transpose, a 3 by 2 design matrix X, and their 2 by 2 product X-prime-X. Tapping a product entry highlights the row and column that made it.",
             es: "Una matriz X transpuesta de 2 por 3, una matriz de diseno X de 3 por 2, y su producto X-prima-X de 2 por 2. Al tocar una entrada del producto se resaltan la fila y la columna que la generaron." },
    step:  { en: 'Next entry', es: 'Siguiente entrada' },
    reset: { en: 'Reset', es: 'Reiniciar' },
    hint:  { en: 'Tap or drag across the product. Arrow keys also move the highlight.',
             es: 'Toca o desliza el dedo sobre el producto. Las flechas tambien mueven el resaltado.' },
    nLab:  { en: "(X'X) row 1 col 1 = n", es: "(X'X) fila 1 col 1 = n" },
    sxLab: { en: "(X'X) row 1 col 2 = sum of x", es: "(X'X) fila 1 col 2 = suma de x" },
    sxxLab:{ en: "(X'X) row 2 col 2 = sum of x squared", es: "(X'X) fila 2 col 2 = suma de x al cuadrado" },
    detLab:{ en: "det(X'X)", es: "det(X'X)" },
    labXt: { en: "X'", es: "X'" },
    labX:  { en: 'X', es: 'X' },
    labP:  { en: "X'X", es: "X'X" },
    rowcol:{ en: 'row', es: 'fila' },
    colw:  { en: 'column', es: 'columna' },
    of:    { en: 'of', es: 'de' },
    meanN: { en: 'this is n, the number of rows', es: 'esta es n, el numero de filas' },
    meanSx:{ en: 'this is the sum of the x values', es: 'esta es la suma de los valores de x' },
    meanSxx:{ en: 'this is the sum of the squared x values', es: 'esta es la suma de los valores de x al cuadrado' },
    caption: {
      en: "X has a column of ones and a column of x values, so X'X is 2 by 2. " +
          "Every entry is one row of X' laid against one column of X, multiplied term " +
          "by term and added.\n\n" +
          "**Try this.** Sweep your finger across the four product entries and read the " +
          "arithmetic underneath: the top-left entry is nothing but n. Then set all three " +
          "sliders to the same value, so the x column copies the ones column, and watch " +
          "det(X'X) fall to zero: no inverse, and no unique fit.",
      es: "X tiene una columna de unos y una columna de valores de x, asi que X'X es de " +
          "2 por 2. Cada entrada es una fila de X' colocada frente a una columna de X, " +
          "multiplicadas termino a termino y sumadas.\n\n" +
          "**Prueba esto.** Desliza el dedo sobre las cuatro entradas del producto y lee " +
          "la aritmetica de abajo: la entrada superior izquierda no es mas que n. Luego " +
          "coloca los tres deslizadores en el mismo valor, para que la columna de x copie " +
          "a la de unos, y observa como det(X'X) cae a cero: sin inversa, y sin ajuste unico."
    }
  };

  var host = document.getElementById('sim');
  var root = el('div', 'sim-root', host);
  var h1 = el('h1', 'sim-title', root);
  h1.textContent = T(STR.title);

  var plot = canvasIn(root, {
    ariaLabel: T(STR.aria),
    ratioNarrow: 0.68, ratioWide: 0.40, minHeight: 192, maxHeight: 268
  });

  var stats = statBlock(root, [
    { id: 'n',   label: STR.nLab },
    { id: 'sx',  label: STR.sxLab, accent: 1 },
    { id: 'sxx', label: STR.sxxLab, accent: 1 },
    { id: 'det', label: STR.detLab, accent: 2 }
  ]);

  var sel = { i: 0, j: 0 };          /* highlighted product entry, 0-based */
  var cellBoxes = [];                /* hit boxes for the product grid */

  var P = sliderBlock(root, [
    { id: 'x1', label: { en: 'x for row 1', es: 'x de la fila 1' }, min: 1, max: 6, step: 1, value: 1 },
    { id: 'x2', label: { en: 'x for row 2', es: 'x de la fila 2' }, min: 1, max: 6, step: 1, value: 2 },
    { id: 'x3', label: { en: 'x for row 3', es: 'x de la fila 3' }, min: 1, max: 6, step: 1, value: 3 }
  ], function () { draw(); });

  buttonBlock(root, [
    { text: STR.step, onClick: function () {
        var k = (sel.i * 2 + sel.j + 1) % 4;
        sel.i = Math.floor(k / 2); sel.j = k % 2;
        draw();
      } },
    { text: STR.reset, secondary: true, onClick: function () {
        var ins = root.querySelectorAll('input[type="range"]');
        [1, 2, 3].forEach(function (v, i) {
          ins[i].value = v;
          ins[i].dispatchEvent(new Event('input'));
        });
        sel.i = 0; sel.j = 0;
        draw();
      } }
  ]);

  captionBlock(root, {
    en: T(STR.caption.en) + '\n\n' + STR.hint.en,
    es: T(STR.caption.es) + '\n\n' + STR.hint.es
  });

  /* ---------- the arithmetic ----------------------------------------- */
  function xs() { return [P.x1, P.x2, P.x3]; }
  /* Design matrix X: column of ones, then the x column. */
  function Xmat() { return xs().map(function (v) { return [1, v]; }); }
  /* X'X computed by the definition: entry (j,k) = sum_i X_ij X_ik. */
  function XtX() {
    var X = Xmat(), out = [[0, 0], [0, 0]], i, j, k;
    for (j = 0; j < 2; j++) {
      for (k = 0; k < 2; k++) {
        var s = 0;
        for (i = 0; i < 3; i++) { s += X[i][j] * X[i][k]; }
        out[j][k] = s;
      }
    }
    return out;
  }

  function fmt(v) {
    return (Math.abs(v - Math.round(v)) < 1e-9) ? String(Math.round(v)) : v.toFixed(2);
  }

  /* ---------- drawing ------------------------------------------------ */
  function draw() {
    var c = plot.ctx, p = plot.pal, w = plot.w, h = plot.h;
    var X = Xmat(), M = XtX();
    plot.clear();

    var small = w < 420;
    var gap = small ? 16 : 24;
    var cw = Math.min(small ? 40 : 54, Math.floor((w - 16 - 2 * gap) / 7));
    var chh = Math.min(cw * 0.72, small ? 28 : 34);
    var fs = Math.max(10, Math.round(chh * 0.44));

    var gridsW = 7 * cw + 2 * gap;
    var x0 = Math.round((w - gridsW) / 2);
    var topLabel = small ? 15 : 18;
    var y0 = topLabel + 8;
    var blockH = 3 * chh;

    c.textAlign = 'center';
    c.textBaseline = 'middle';

    function cellRect(bx, by, col, row) {
      return { x: bx + col * cw, y: by + row * chh, w: cw, h: chh };
    }
    function paintCell(r, fill, stroke, txt, col) {
      if (fill) { c.fillStyle = fill; c.fillRect(r.x, r.y, r.w, r.h); }
      c.strokeStyle = stroke || p.hairline;
      c.lineWidth = 1;
      c.strokeRect(r.x + 0.5, r.y + 0.5, r.w - 1, r.h - 1);
      c.fillStyle = col || p.text;
      c.font = fs + 'px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
      c.fillText(txt, r.x + r.w / 2, r.y + r.h / 2 + 0.5);
    }
    function blockLabel(txt, bx, bw, by) {
      c.fillStyle = p.text2;
      c.font = '600 ' + (small ? 11 : 12) + 'px -apple-system, "Segoe UI", Roboto, sans-serif';
      c.fillText(txt, bx + bw / 2, by - 9);
    }

    /* --- X' : 2 rows (p), 3 columns (n). Row i of X' is column i of X. --- */
    var xtX = x0, xtY = y0 + (blockH - 2 * chh) / 2;
    blockLabel(T(STR.labXt), xtX, 3 * cw, y0);
    var i, j;
    for (i = 0; i < 2; i++) {
      for (j = 0; j < 3; j++) {
        var hot = (i === sel.i);
        paintCell(cellRect(xtX, xtY, j, i),
          hot ? tint(p.accent, 0.16) : p.bg,
          hot ? p.accent : p.hairline,
          fmt(X[j][i]), hot ? p.accent : p.text);
      }
    }

    /* --- X : 3 rows (n), 2 columns (p) --- */
    var xX = x0 + 3 * cw + gap, xY = y0;
    blockLabel(T(STR.labX), xX, 2 * cw, y0);
    for (i = 0; i < 3; i++) {
      for (j = 0; j < 2; j++) {
        var hot2 = (j === sel.j);
        paintCell(cellRect(xX, xY, j, i),
          hot2 ? tint(p.accent, 0.16) : p.bg,
          hot2 ? p.accent : p.hairline,
          fmt(X[i][j]), hot2 ? p.accent : p.text);
      }
    }

    /* --- the product --- */
    var pX = x0 + 5 * cw + 2 * gap, pY = y0 + (blockH - 2 * chh) / 2;
    blockLabel(T(STR.labP), pX, 2 * cw, y0);
    cellBoxes = [];
    for (i = 0; i < 2; i++) {
      for (j = 0; j < 2; j++) {
        var r = cellRect(pX, pY, j, i);
        cellBoxes.push({ i: i, j: j, r: r });
        var on = (i === sel.i && j === sel.j);
        paintCell(r, on ? tint(p.accent2, 0.18) : p.bg,
          on ? p.accent2 : p.hairline, fmt(M[i][j]), on ? p.accent2 : p.text);
      }
    }

    /* --- the operators --- */
    c.fillStyle = p.text2;
    c.font = (small ? 14 : 17) + 'px -apple-system, "Segoe UI", Roboto, sans-serif';
    c.fillText('×', x0 + 3 * cw + gap / 2, y0 + blockH / 2);
    c.fillText('=', x0 + 5 * cw + 1.5 * gap, y0 + blockH / 2);

    /* --- the derivation, spelled out term by term --- */
    var lineY = y0 + blockH + (small ? 22 : 28);
    var lh = small ? 17 : 20;
    c.textAlign = 'center';

    c.fillStyle = p.text2;
    c.font = (small ? 11 : 12.5) + 'px -apple-system, "Segoe UI", Roboto, sans-serif';
    c.fillText("(X'X) " + T(STR.rowcol) + ' ' + (sel.i + 1) + ' ' + T(STR.colw) + ' ' + (sel.j + 1)
      + '  =  ' + T(STR.rowcol) + ' ' + (sel.i + 1) + ' ' + T(STR.of) + " X'  ×  "
      + T(STR.colw) + ' ' + (sel.j + 1) + ' ' + T(STR.of) + ' X', w / 2, lineY);

    var terms = [], total = 0;
    for (i = 0; i < 3; i++) {
      terms.push(fmt(X[i][sel.i]) + '·' + fmt(X[i][sel.j]));
      total += X[i][sel.i] * X[i][sel.j];
    }
    c.fillStyle = p.accent2;
    c.font = '600 ' + (small ? 12 : 14) + 'px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
    c.fillText(terms.join(' + ') + ' = ' + fmt(total), w / 2, lineY + lh);

    var meaning = (sel.i === 0 && sel.j === 0) ? T(STR.meanN)
      : (sel.i === 1 && sel.j === 1) ? T(STR.meanSxx) : T(STR.meanSx);
    c.fillStyle = p.text2;
    c.font = 'italic ' + (small ? 11 : 12.5) + 'px -apple-system, "Segoe UI", Roboto, sans-serif';
    c.fillText(meaning, w / 2, lineY + 2 * lh);

    /* --- readouts --- */
    stats.set('n', fmt(M[0][0]));
    stats.set('sx', fmt(M[0][1]));
    stats.set('sxx', fmt(M[1][1]));
    stats.set('det', fmt(M[0][0] * M[1][1] - M[0][1] * M[1][0]));
    stats.announce();
  }

  /* Tint a hex token toward transparency without hardcoding any color. */
  function tint(hex, alpha) {
    var s = hex.trim();
    if (s.charAt(0) !== '#' || (s.length !== 7 && s.length !== 4)) { return s; }
    if (s.length === 4) { s = '#' + s[1] + s[1] + s[2] + s[2] + s[3] + s[3]; }
    var r = parseInt(s.substr(1, 2), 16), g = parseInt(s.substr(3, 2), 16), b = parseInt(s.substr(5, 2), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  /* ---------- interaction -------------------------------------------- */
  function pick(q) {
    for (var k = 0; k < cellBoxes.length; k++) {
      var b = cellBoxes[k], r = b.r;
      /* Generous pad so a fingertip does not have to be precise. */
      if (q.x >= r.x - 8 && q.x <= r.x + r.w + 8 && q.y >= r.y - 8 && q.y <= r.y + r.h + 8) {
        return b;
      }
    }
    return null;
  }
  var down = false;
  plot.canvas.addEventListener('pointerdown', function (ev) {
    var b = pick(plot.pos(ev));
    if (!b) { return; }
    down = true;
    plot.canvas.setPointerCapture(ev.pointerId);
    sel.i = b.i; sel.j = b.j;
    ev.preventDefault();
    draw();
  });
  plot.canvas.addEventListener('pointermove', function (ev) {
    if (!down) { return; }
    var b = pick(plot.pos(ev));
    if (b && (b.i !== sel.i || b.j !== sel.j)) { sel.i = b.i; sel.j = b.j; draw(); }
    ev.preventDefault();
  });
  function up(ev) {
    if (!down) { return; }
    down = false;
    if (ev && ev.pointerId !== undefined && plot.canvas.hasPointerCapture &&
        plot.canvas.hasPointerCapture(ev.pointerId)) {
      plot.canvas.releasePointerCapture(ev.pointerId);
    }
  }
  plot.canvas.addEventListener('pointerup', up);
  plot.canvas.addEventListener('pointercancel', up);
  plot.canvas.addEventListener('keydown', function (ev) {
    var k = ev.key;
    if (k === 'ArrowLeft') { sel.j = 0; }
    else if (k === 'ArrowRight') { sel.j = 1; }
    else if (k === 'ArrowUp') { sel.i = 0; }
    else if (k === 'ArrowDown') { sel.i = 1; }
    else { return; }
    ev.preventDefault();
    draw();
  });

  /* ---------- boot ---------------------------------------------------- */
  function run() { plot.resize(); draw(); }
  hooks.push(run);
  if (window.ResizeObserver) { new ResizeObserver(run).observe(plot.wrap); }
  else { window.addEventListener('resize', run); }
  wireTheme();
  run();
}());
</script>
</body>
</html>
